<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장소 탐색기</title>
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=6ac811cfe03fac96b5d6699028337d78&libraries=services"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ━━━━━━━━ CSS 변수 ━━━━━━━━ */
    :root {
      --bg:#f2f2f7; --surface:#fff; --border:#e5e5ea; --border-soft:#f0f0f5;
      --accent:#007aff; --accent-l:#e8f0fe; --accent-d:rgba(0,122,255,.12);
      --red:#ff3b30; --green:#34c759; --orange:#ff9500;
      --t1:#1c1c1e; --t2:#636366; --t3:#aeaeb2;
      --sh-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
      --sh-md:0 4px 16px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.06);
      --sh-lg:0 16px 40px rgba(0,0,0,.18),0 4px 12px rgba(0,0,0,.08);
      --r:10px; --r-md:14px; --r-lg:20px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}

    /* ━━━━━━━━ 헤더 ━━━━━━━━ */
    header{flex-shrink:0;height:52px;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:200}
    .h-icon{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem;box-shadow:0 2px 8px rgba(0,122,255,.38);flex-shrink:0}
    .h-text{flex:1}
    .h-title{font-size:.9rem;font-weight:700;letter-spacing:-.02em}
    .h-sub{font-size:.65rem;color:var(--t3)}
    .h-home-btn{width:32px;height:32px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .14s;flex-shrink:0}
    .h-home-btn:hover{border-color:var(--accent);background:var(--accent-d)}
    .h-home-btn.active{background:var(--accent);border-color:var(--accent)}

    /* ━━━━━━━━ 레이아웃 ━━━━━━━━ */
    .layout{flex:1;display:grid;grid-template-columns:360px 1fr;overflow:hidden}

    /* ━━━━━━━━ 사이드바 ━━━━━━━━ */
    .sidebar{background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}

    /* 검색 패널 */
    .search-panel{background:var(--surface);padding:12px 12px 10px;border-bottom:1px solid var(--border-soft);flex-shrink:0}
    .search-row{display:flex;gap:7px;align-items:center}
    .s-wrap{flex:1;position:relative}
    .s-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:.78rem;color:var(--t3);pointer-events:none}
    .s-wrap input{width:100%;padding:8px 10px 8px 29px;background:var(--bg);border:1.5px solid transparent;border-radius:var(--r);font-size:.84rem;font-family:inherit;color:var(--t1);outline:none;transition:border-color .18s,background .18s}
    .s-wrap input::placeholder{color:var(--t3)}
    .s-wrap input:focus{background:var(--surface);border-color:var(--accent)}
    .s-btn{padding:8px 14px;background:var(--accent);border:none;border-radius:var(--r);color:#fff;font-size:.8rem;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;box-shadow:0 2px 8px rgba(0,122,255,.3);transition:background .15s,transform .1s}
    .s-btn:hover{background:#0066d6}
    .s-btn:active{transform:scale(.96)}

    /* 지역 칩 */
    .region-wrap{margin-top:9px}
    .region-label{font-size:.62rem;font-weight:700;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
    .chips{display:flex;gap:5px;flex-wrap:wrap}
    .chip{padding:4px 10px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);font-size:.71rem;font-weight:500;color:var(--t2);font-family:inherit;cursor:pointer;transition:all .14s;white-space:nowrap}
    .chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-d)}
    .chip.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(0,122,255,.28)}

    /* 뷰 내비 바 */
    .view-nav{display:none;align-items:center;gap:8px;padding:7px 12px;background:var(--surface);border-bottom:1px solid var(--border-soft);flex-shrink:0}
    .view-nav.show{display:flex}
    .back-btn{display:flex;align-items:center;gap:4px;padding:4px 9px;border:1.5px solid var(--border);border-radius:100px;background:none;font-size:.72rem;font-weight:600;color:var(--t2);font-family:inherit;cursor:pointer;transition:all .14s}
    .back-btn:hover{border-color:var(--accent);color:var(--accent)}
    .view-nav-title{font-size:.78rem;font-weight:600;color:var(--t1);flex:1;text-align:center}

    /* 상태 바 */
    .status-bar{padding:6px 13px;font-size:.71rem;font-weight:500;color:var(--t3);background:var(--surface);border-bottom:1px solid var(--border-soft);min-height:29px;display:flex;align-items:center;gap:5px;flex-shrink:0}
    .status-bar.loading{color:var(--accent)}
    .status-bar.error{color:var(--red)}
    .status-bar.success{color:var(--green)}

    /* 스크롤 영역 */
    .scroll-area{flex:1;overflow-y:auto;display:flex;flex-direction:column}
    .scroll-area::-webkit-scrollbar{width:4px}
    .scroll-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       홈 뷰
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    #viewHome{display:block}
    #viewSearch,#viewFolder{display:none}

    /* 큐레이션 섹션 */
    .home-sec{padding:12px 12px 4px}
    .sec-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:9px}
    .sec-title{font-size:.8rem;font-weight:700;color:var(--t1)}
    .sec-sub{font-size:.67rem;color:var(--t3)}
    .sec-action{font-size:.7rem;color:var(--accent);font-weight:600;cursor:pointer;background:none;border:none;font-family:inherit;padding:2px 4px}
    .sec-action:hover{text-decoration:underline}

    /* 슬라이더 */
    .slider-outer{position:relative;overflow:hidden;border-radius:var(--r-md);box-shadow:var(--sh-md);user-select:none;cursor:grab}
    .slider-outer:active{cursor:grabbing}
    .slider-track{display:flex;transition:transform .42s cubic-bezier(.4,0,.2,1);will-change:transform}
    .curate-card{min-width:100%;height:160px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end}
    .card-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .5s ease}
    .curate-card:hover .card-bg{transform:scale(1.03)}
    .card-ov{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 20%,rgba(0,0,0,.12) 50%,rgba(0,0,0,.6) 100%)}
    .card-cnt{position:relative;z-index:2;padding:10px 13px 12px}
    .card-tag{display:inline-block;padding:2px 7px;border-radius:100px;font-size:.62rem;font-weight:700;margin-bottom:4px;backdrop-filter:blur(6px)}
    .card-pname{font-size:1rem;font-weight:700;color:#fff;line-height:1.3;text-shadow:0 1px 4px rgba(0,0,0,.3)}
    .card-region{font-size:.68rem;color:rgba(255,255,255,.78);margin-top:3px}
    .card-desc-p{font-size:.69rem;color:rgba(255,255,255,.7);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .slider-ctrl{display:flex;align-items:center;justify-content:space-between;margin-top:9px;padding:0 2px}
    .arrows{display:flex;gap:5px}
    .arr-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--t2);transition:all .14s;box-shadow:var(--sh-sm)}
    .arr-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-d)}
    .arr-btn:active{transform:scale(.92)}
    .dots{display:flex;gap:4px;align-items:center}
    .dot{width:5px;height:5px;border-radius:3px;background:var(--border);cursor:pointer;transition:all .28s cubic-bezier(.4,0,.2,1)}
    .dot.active{width:18px;background:var(--accent)}
    .prog-wrap{flex:1;height:2px;background:var(--border);border-radius:1px;margin:0 9px;overflow:hidden}
    .prog-bar{height:100%;background:var(--accent);border-radius:1px;width:0%}

    /* ━━━━━━━━ 폴더 그리드 (홈) ━━━━━━━━ */
    .folder-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:2px 0 12px}
    .folder-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:12px 6px 10px;border-radius:var(--r-md);cursor:pointer;position:relative;transition:transform .14s,box-shadow .14s;box-shadow:var(--sh-sm)}
    .folder-card:hover{transform:translateY(-2px);box-shadow:var(--sh-md)}
    .folder-card:active{transform:scale(.96)}
    .folder-ico{font-size:1.6rem;line-height:1}
    .folder-name{font-size:.71rem;font-weight:600;color:#fff;text-align:center;line-height:1.3;word-break:keep-all}
    .folder-count{font-size:.62rem;color:rgba(255,255,255,.75);font-weight:500}
    .folder-del{position:absolute;top:5px;right:5px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.25);color:#fff;font-size:.6rem;display:none;align-items:center;justify-content:center;cursor:pointer;transition:background .12s}
    .folder-card:hover .folder-del{display:flex}
    .folder-del:hover{background:rgba(255,59,48,.7)}
    /* 새 폴더 만들기 카드 */
    .add-folder-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:12px 6px 10px;border-radius:var(--r-md);cursor:pointer;border:2px dashed var(--border);transition:all .14s}
    .add-folder-card:hover{border-color:var(--accent);background:var(--accent-d)}
    .add-folder-card .add-ico{font-size:1.4rem;color:var(--t3)}
    .add-folder-card .add-lbl{font-size:.68rem;font-weight:600;color:var(--t3)}
    .add-folder-card:hover .add-ico,.add-folder-card:hover .add-lbl{color:var(--accent)}

    /* 홈 빈 폴더 힌트 */
    .folder-empty{display:flex;flex-direction:column;align-items:center;gap:7px;padding:20px 0 8px;opacity:.5}
    .folder-empty .fe-ico{font-size:2rem}
    .folder-empty p{font-size:.75rem;color:var(--t3);text-align:center;line-height:1.65}

    /* ━━━━━━━━ 검색 결과 뷰 ━━━━━━━━ */
    #viewSearch,#viewFolder{padding:8px 10px 14px}
    .result-card{padding:11px 13px;margin-bottom:6px;background:var(--surface);border:1.5px solid transparent;border-radius:var(--r-md);cursor:pointer;box-shadow:var(--sh-sm);position:relative;transition:border-color .15s,box-shadow .15s,transform .12s;animation:cardIn .2s ease both}
    @keyframes cardIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .result-card:hover{border-color:var(--accent);box-shadow:var(--sh-md);transform:translateY(-1px)}
    .result-card.active{border-color:var(--accent);background:var(--accent-l);box-shadow:0 0 0 3px var(--accent-d)}
    .card-num{position:absolute;top:9px;right:38px;font-size:.63rem;font-weight:700;color:var(--t3)}
    .card-name{font-size:.86rem;font-weight:700;margin-bottom:6px;padding-right:58px;line-height:1.4}
    .card-rows{display:flex;flex-direction:column;gap:3px}
    .card-row{display:flex;align-items:flex-start;gap:6px;font-size:.71rem;color:var(--t2);line-height:1.55}
    .card-row .ri{flex-shrink:0;font-size:.75rem;line-height:1.55}
    /* 저장 버튼 */
    .save-btn{position:absolute;top:8px;right:10px;width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.78rem;transition:all .14s;z-index:2}
    .save-btn:hover{border-color:var(--accent);background:var(--accent-d)}
    .save-btn.saved{background:var(--accent);border-color:var(--accent);color:#fff}

    /* ━━━━━━━━ 폴더 내용 뷰 ━━━━━━━━ */
    .saved-place-card{padding:10px 12px;margin-bottom:6px;background:var(--surface);border:1.5px solid transparent;border-radius:var(--r-md);cursor:pointer;box-shadow:var(--sh-sm);position:relative;transition:border-color .15s,box-shadow .15s,transform .12s;animation:cardIn .2s ease both}
    .saved-place-card:hover{border-color:var(--accent);box-shadow:var(--sh-md);transform:translateY(-1px)}
    .sp-name{font-size:.85rem;font-weight:700;margin-bottom:5px;padding-right:30px;line-height:1.4}
    .sp-addr{font-size:.72rem;color:var(--t2);line-height:1.5;margin-bottom:2px}
    .sp-cat{font-size:.68rem;color:var(--t3)}
    .sp-del{position:absolute;top:8px;right:9px;width:22px;height:22px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.68rem;color:var(--t3);transition:all .12s}
    .sp-del:hover{background:rgba(255,59,48,.12);color:var(--red)}
    .folder-view-empty{display:flex;flex-direction:column;align-items:center;gap:8px;padding:40px 20px;opacity:.5}
    .folder-view-empty .e-ico{font-size:2rem}
    .folder-view-empty p{font-size:.78rem;color:var(--t3);text-align:center;line-height:1.7}

    /* ━━━━━━━━ 지도 ━━━━━━━━ */
    #map{width:100%;height:100%}

    /* ━━━━━━━━ 이모지 마커 ━━━━━━━━ */
    .emoji-marker{font-size:1.8rem;line-height:1;cursor:pointer;filter:drop-shadow(0 3px 5px rgba(0,0,0,.18));transition:transform .15s,filter .15s;user-select:none;display:block}
    .emoji-marker:hover{transform:scale(1.3) translateY(-3px);filter:drop-shadow(0 6px 10px rgba(0,0,0,.22))}

    /* ━━━━━━━━ 인포 팝업 ━━━━━━━━ */
    .info-bubble{background:var(--surface);border-radius:var(--r-md);padding:12px 13px 11px;min-width:185px;max-width:240px;box-shadow:var(--sh-lg);border:1px solid var(--border);position:relative;animation:popIn .17s cubic-bezier(.34,1.56,.64,1) both}
    @keyframes popIn{from{opacity:0;transform:scale(.88) translateY(5px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .info-x{position:absolute;top:7px;right:8px;width:18px;height:18px;background:var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--t2);cursor:pointer;transition:background .12s}
    .info-x:hover{background:var(--border)}
    .info-name{font-size:.85rem;font-weight:700;margin-bottom:4px;padding-right:20px;line-height:1.4}
    .info-addr{font-size:.72rem;color:var(--t2);line-height:1.55}
    .info-phone{font-size:.7rem;color:var(--accent);margin-top:3px;font-weight:500}
    .info-tail{width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-top:8px solid var(--surface);margin:0 auto;filter:drop-shadow(0 2px 2px rgba(0,0,0,.07))}

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       모달 공통
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.38);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s}
    .modal-backdrop.open{opacity:1;pointer-events:all}
    .modal-box{background:var(--surface);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-lg);transform:scale(.92) translateY(16px);transition:transform .26s cubic-bezier(.34,1.56,.64,1)}
    .modal-backdrop.open .modal-box{transform:scale(1) translateY(0)}

    /* ━━━━━━━━ 큐레이션 모달 ━━━━━━━━ */
    #curateModal .modal-box{width:400px;max-width:92vw}
    .modal-hero{height:155px;position:relative;display:flex;align-items:flex-end;padding:14px 18px}
    .modal-hero-bg{position:absolute;inset:0;background-size:cover;background-position:center}
    .modal-hero-ov{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(0,0,0,.55) 100%)}
    .modal-hero-emoji{position:absolute;top:14px;right:16px;font-size:2.4rem;filter:drop-shadow(0 3px 8px rgba(0,0,0,.3))}
    .modal-hero-cnt{position:relative;z-index:2}
    .modal-tag{display:inline-block;padding:2px 8px;border-radius:100px;font-size:.62rem;font-weight:700;margin-bottom:5px;backdrop-filter:blur(6px)}
    .modal-pname{font-size:1.2rem;font-weight:800;color:#fff;line-height:1.25;text-shadow:0 1px 5px rgba(0,0,0,.3)}
    .modal-pregion{font-size:.72rem;color:rgba(255,255,255,.8);margin-top:2px}
    .modal-body{padding:16px 18px 18px}
    .modal-desc{font-size:.82rem;color:var(--t2);line-height:1.75;margin-bottom:14px}
    .modal-info{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
    .m-info-row{display:flex;gap:9px;align-items:flex-start}
    .m-ico{font-size:.82rem;flex-shrink:0;margin-top:1px}
    .m-label{font-size:.68rem;color:var(--t3);font-weight:700;width:42px;flex-shrink:0;margin-top:2px}
    .m-val{font-size:.78rem;color:var(--t1);font-weight:500;line-height:1.5}
    .modal-btns{display:flex;gap:7px}
    .m-btn{flex:1;padding:10px;border-radius:var(--r);font-size:.8rem;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .14s}
    .m-btn.primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(0,122,255,.32)}
    .m-btn.primary:hover{background:#0066d6}
    .m-btn.secondary{background:var(--bg);color:var(--t1);border:1.5px solid var(--border)}
    .m-btn.secondary:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-d)}
    .m-btn:active{transform:scale(.96)}

    /* ━━━━━━━━ 저장 폴더 선택 모달 ━━━━━━━━ */
    #savePickerModal .modal-box{width:320px;max-width:92vw;padding:18px}
    .picker-title{font-size:.9rem;font-weight:700;margin-bottom:4px}
    .picker-sub{font-size:.73rem;color:var(--t3);margin-bottom:14px}
    .picker-folders{display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto;margin-bottom:12px}
    .picker-folder-row{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:var(--r);border:1.5px solid var(--border);cursor:pointer;transition:all .14s}
    .picker-folder-row:hover{border-color:var(--accent);background:var(--accent-d)}
    .pf-dot{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
    .pf-name{font-size:.82rem;font-weight:600;flex:1}
    .pf-count{font-size:.68rem;color:var(--t3)}
    .picker-new-btn{width:100%;padding:9px;border:2px dashed var(--border);border-radius:var(--r);background:none;font-size:.78rem;font-weight:600;color:var(--t3);font-family:inherit;cursor:pointer;transition:all .14s}
    .picker-new-btn:hover{border-color:var(--accent);color:var(--accent)}
    .picker-cancel{width:100%;margin-top:6px;padding:8px;border:none;background:none;font-size:.75rem;color:var(--t3);font-family:inherit;cursor:pointer}

    /* ━━━━━━━━ 폴더 생성 모달 ━━━━━━━━ */
    #createFolderModal .modal-box{width:320px;max-width:92vw;padding:20px}
    .cf-title{font-size:.9rem;font-weight:700;margin-bottom:14px}
    .cf-label{font-size:.7rem;font-weight:700;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
    .cf-input{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:var(--r);font-size:.84rem;font-family:inherit;color:var(--t1);outline:none;margin-bottom:14px;transition:border-color .15s}
    .cf-input:focus{border-color:var(--accent)}
    .icon-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;margin-bottom:14px}
    .ico-opt{width:100%;aspect-ratio:1;border-radius:8px;border:2px solid transparent;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .12s}
    .ico-opt:hover{background:var(--accent-d);border-color:var(--accent)}
    .ico-opt.sel{border-color:var(--accent);background:var(--accent-d)}
    .color-swatches{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap}
    .swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .12s,border-color .12s}
    .swatch:hover{transform:scale(1.15)}
    .swatch.sel{border-color:var(--t1);transform:scale(1.1)}
    .cf-btns{display:flex;gap:7px}
    .cf-btn{flex:1;padding:9px;border-radius:var(--r);font-size:.8rem;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .14s}
    .cf-btn.primary{background:var(--accent);color:#fff}
    .cf-btn.primary:hover{background:#0066d6}
    .cf-btn.secondary{background:var(--bg);color:var(--t1);border:1.5px solid var(--border)}
    .cf-btn.secondary:hover{border-color:var(--accent);color:var(--accent)}
    .cf-btn:active{transform:scale(.96)}
  </style>
</head>
<body>

  <header>
    <div class="h-icon">📍</div>

      <div class="h-title">장소 탐색기</div>

  <div class="layout">

      <!-- 뷰 내비 바 (검색/폴더 뷰일 때 표시) -->

        <button class="back-btn" id="backBtn">← 홈</button>
        <span class="view-nav-title" id="viewNavTitle">검색 결과</span>
        <div style="width:46px"></div>
      </div>

      <!-- 상태 바 -->
      <div class="status-bar" id="statusBar">큐레이션을 눌러보거나 검색해보세요.</div>

      <!-- 스크롤 영역 -->
      <div class="scroll-area">

        <!-- ── 홈 뷰 ── -->

          <!-- 큐레이션 캐러셀 -->
          <div class="home-sec">
            <div class="sec-header">
              <div>
                <div class="sec-title">✨ 이런 장소는 어때요?</div>

          </div>

        </div>

        <!-- ── 검색 결과 뷰 ── -->

        <!-- ── 폴더 내용 뷰 ── -->

      </div>
    </aside>

    <div id="map"></div>
  </div>

  <!-- ── 큐레이션 모달 ── -->

  <script>
  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

  // '전체' = index 0, location 파라미터 없이 전국 검색
  const REGIONS = [
    { name:'🌐 전체',  lat:null,    lng:null,    level:null },
    { name:'🏙️ 성수',  lat:37.5447, lng:127.0557, level:4 },

  ];

  const CURATION = [
    { emoji:'☕', name:'대림창고',        region:'성수',   regionIdx:1,
      tag:'감성 카페', tagBg:'rgba(255,200,120,.25)', tagColor:'#b37a00',
      desc:'100년 된 창고를 개조해 탄생한 성수동의 상징 카페. 높은 천장과 빈티지 소품이 만들어내는 분위기가 독보적이에요.',
      gradient:'linear-gradient(145deg,#c8a882,#7a5535)',
      keyword:'성수 대림창고',
      tips:[{ico:'⏰',label:'영업시간',val:'매일 10:00 – 22:00'},{ico:'💡',label:'추천',val:'오전 오픈 직후 방문하면 줄 없이 입장 가능'},{ico:'🚇',label:'교통',val:'2호선 성수역 2번 출구 도보 10분'}] },
    { emoji:'🎨', name:'성수연방',         region:'성수',   regionIdx:1,
      tag:'복합문화공간', tagBg:'rgba(180,140,255,.25)', tagColor:'#6b3fc9',
      desc:'갤러리·편집샵·카페가 한 건물에 밀집한 성수의 핫플. 팝업 행사가 자주 열려 방문할 때마다 새로운 경험을 할 수 있어요.',

      desc:'폐철로 위에 조성된 6km 도심 녹지. 연남동·홍대·마포를 잇는 산책로로 봄 벚꽃·여름 잔디밭이 특히 아름다워요.',
      gradient:'linear-gradient(145deg,#a8d8a8,#3d8c3d)',
      keyword:'경의선 숲길',
      tips:[{ico:'⏰',label:'이용',val:'24시간 (매점은 시간 별도)'},{ico:'💡',label:'추천',val:'연트럴파크 구간(연남동 쪽)이 가장 붐비고 예쁨'},{ico:'🚇',label:'교통',val:'경의중앙선 홍대입구역 3번 출구 연결'}] },
    { emoji:'📚', name:'별마당 도서관',    region:'강남',   regionIdx:4,
      tag:'이색 명소', tagBg:'rgba(100,170,255,.25)', tagColor:'#0055c9',
      desc:'코엑스 내 13m 높이의 초대형 서가. 서울 한복판에서 만나는 환상적인 공간으로 인생샷 성지로도 유명해요.',
      gradient:'linear-gradient(145deg,#90c0e8,#2060a8)',
      keyword:'별마당 도서관',
      tips:[{ico:'⏰',label:'운영',val:'매일 10:30 – 22:00 (무료 입장)'},{ico:'💡',label:'포토팁',val:'2층 발코니에서 내려다보는 구도가 인기'},{ico:'🚇',label:'교통',val:'2호선 삼성역 6번 출구 바로 연결'}] },
    { emoji:'🌸', name:'석촌호수',          region:'잠실',   regionIdx:5,
      tag:'로맨틱 산책', tagBg:'rgba(255,150,180,.25)', tagColor:'#c02060',
      desc:'봄엔 1km 벚꽃 터널, 가을엔 단풍. 롯데월드타워를 배경으로 사진 찍는 커플 명소예요.',

    { emoji:'🍜', name:'경리단길',          region:'이태원', regionIdx:6,

      gradient:'linear-gradient(145deg,#e8c888,#a07020)',
      keyword:'경리단길 맛집',
      tips:[{ico:'💡',label:'추천',val:'중간 언덕 꼭대기에서 이태원 야경 감상'},{ico:'🍽️',label:'먹거리',val:'멕시칸·인도·일본·중동 등 30개국 이상'},{ico:'🚇',label:'교통',val:'6호선 이태원역 2번 출구 도보 15분'}] },
    { emoji:'🎸', name:'앤트러사이트 홍대', region:'홍대',   regionIdx:2,

      desc:'탄광 기계를 인테리어로 활용한 인더스트리얼 감성 카페. 홍대에서 가장 독특한 공간 중 하나예요.',
      gradient:'linear-gradient(145deg,#909090,#383838)',
      keyword:'앤트러사이트 홍대',
      tips:[{ico:'⏰',label:'영업',val:'매일 11:00 – 22:00'},{ico:'💡',label:'추천',val:'지하 기계실 공간이 압도적 — 꼭 내려가 보기'},{ico:'🚇',label:'교통',val:'2호선 홍대입구역 9번 출구 도보 8분'}] },

      desc:'압구정·청담 일대의 프리미엄 카페 & 레스토랑 거리. 해 질 녘부터 분위기가 무르익어 데이트 코스로 손꼽혀요.',
      gradient:'linear-gradient(145deg,#2a2a4a,#0a0a20)',
      keyword:'도산공원 카페',
      tips:[{ico:'⏰',label:'추천시간',val:'일몰 후 ~ 자정'},{ico:'💡',label:'코스',val:'도산공원 산책 → 카페 → 청담 레스토랑'},{ico:'🚇',label:'교통',val:'3호선 압구정역 1번 출구 도보 10분'}] },
  ];

  const FOLDER_ICONS  = ['⭐','❤️','☕','🍽️','🏨','🛍️','🎬','📚','🏃','💼','🌿','🎵','🏖️','🎂','🍺','🌸'];
  const FOLDER_COLORS = ['#ff3b30','#ff9500','#ffcc00','#34c759','#007aff','#af52de','#ff2d55','#5ac8fa'];

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     2. localStorage 헬퍼
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function loadFolders()  { try { return JSON.parse(localStorage.getItem('place_folders')||'[]'); } catch(e){ return []; } }
  function saveFolders(f) { localStorage.setItem('place_folders', JSON.stringify(f)); }
  function loadSaved()    { try { return JSON.parse(localStorage.getItem('place_saved')||'[]'); } catch(e){ return []; } }
  function saveSaved(s)   { localStorage.setItem('place_saved', JSON.stringify(s)); }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     3. 지도 초기화
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  const map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(37.55, 126.975),
    level: 7
  });
  const ps = new kakao.maps.services.Places();

  let markerOverlays  = [];
  let openInfoOverlay = null;
  let activeChipIdx   = 0;  // 현재 선택된 지역 칩 인덱스

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     4. 지역 칩 렌더링
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  const chipWrap = document.getElementById('regionChips');
  REGIONS.forEach((r, i) => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (i === 0 ? ' active' : '');
    btn.textContent = r.name;
    btn.addEventListener('click', () => {
      chipWrap.querySelector('.chip.active')?.classList.remove('active');
      btn.classList.add('active');
      activeChipIdx = i;
      // '전체'는 지도 이동 없음, 나머지는 해당 지역으로 이동
      if (r.lat !== null) {
        map.setCenter(new kakao.maps.LatLng(r.lat, r.lng));
        map.setLevel(r.level);
      }
    });
    chipWrap.appendChild(btn);
  });

  // 특정 인덱스의 칩을 프로그래밍으로 클릭
  function activateChip(idx) {
    const chips = chipWrap.querySelectorAll('.chip');
    if (chips[idx]) chips[idx].click();
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     5. 뷰 전환
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  // 현재 열린 폴더 ID
  let currentFolderId = null;

  function showView(name, title) {
    document.getElementById('viewHome').style.display   = name === 'home'   ? 'block' : 'none';
    document.getElementById('viewSearch').style.display = name === 'search' ? 'block' : 'none';
    document.getElementById('viewFolder').style.display = name === 'folder' ? 'block' : 'none';

    const nav = document.getElementById('viewNav');
    if (name === 'home') {
      nav.classList.remove('show');
      document.getElementById('homeBtn').classList.add('active');
      setStatus('큐레이션을 눌러보거나 검색해보세요.');
    } else {
      nav.classList.add('show');
      document.getElementById('homeBtn').classList.remove('active');
      document.getElementById('viewNavTitle').textContent = title || '';
    }
  }

  // 홈 버튼 & 뒤로가기
  document.getElementById('homeBtn').addEventListener('click', goHome);
  document.getElementById('backBtn').addEventListener('click', goHome);
  function goHome() {
    clearMarkers();
    closeInfo();
    currentFolderId = null;
    renderFolderGrid();
    showView('home');
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     6. 유틸
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function getEmoji(cat) {
    if (!cat) return '📍';
    if (cat.includes('카페'))                            return '☕';
    if (cat.includes('음식점')||cat.includes('식당'))    return '🍽️';
    if (cat.includes('편의점'))                          return '🏪';
    if (cat.includes('병원')||cat.includes('의원'))      return '🏥';
    if (cat.includes('약국'))                            return '💊';
    if (cat.includes('학교')||cat.includes('교육'))      return '🏫';
    if (cat.includes('주차'))                            return '🅿️';
    if (cat.includes('마트'))                            return '🛒';
    if (cat.includes('은행'))                            return '🏦';
    if (cat.includes('주유소'))                          return '⛽';
    if (cat.includes('숙박')||cat.includes('호텔'))      return '🏨';
    if (cat.includes('영화')||cat.includes('문화'))      return '🎬';
    if (cat.includes('스포츠')||cat.includes('헬스'))    return '💪';
    if (cat.includes('베이커리')||cat.includes('빵'))    return '🥐';
    if (cat.includes('술')||cat.includes('바'))          return '🍺';
    return '📍';
  }

  function setStatus(msg, type='') {
    const b = document.getElementById('statusBar');
    b.textContent = msg; b.className = 'status-bar ' + type;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     7. 마커 & 인포 팝업
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function clearMarkers() {
    markerOverlays.forEach(ov => ov.setMap(null));
    markerOverlays = [];
  }
  function closeInfo() {
    if (openInfoOverlay) { openInfoOverlay.setMap(null); openInfoOverlay = null; }
  }
  function showInfo(place, pos) {
    closeInfo();
    const wrap = document.createElement('div');
    const bub  = document.createElement('div'); bub.className = 'info-bubble';
    const xb   = document.createElement('div'); xb.className = 'info-x'; xb.textContent = '✕';
    xb.addEventListener('click', e => { e.stopPropagation(); closeInfo(); });
    const nm = document.createElement('div'); nm.className = 'info-name'; nm.textContent = place.place_name;
    const ad = document.createElement('div'); ad.className = 'info-addr';
    ad.textContent = place.road_address_name || place.address_name || '주소 정보 없음';
    bub.appendChild(xb); bub.appendChild(nm); bub.appendChild(ad);
    if (place.phone) {
      const ph = document.createElement('div'); ph.className = 'info-phone'; ph.textContent = '📞 ' + place.phone;
      bub.appendChild(ph);
    }
    const tail = document.createElement('div'); tail.className = 'info-tail';
    wrap.appendChild(bub); wrap.appendChild(tail);
    openInfoOverlay = new kakao.maps.CustomOverlay({ position:pos, content:wrap, yAnchor:1.48, zIndex:20 });
    openInfoOverlay.setMap(map);
  }

  // 저장 여부 확인
  function isPlaceSaved(placeId) {
    return loadSaved().some(s => s.kakao_id === placeId);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     8. 검색
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function runSearch(keyword, forceLoc) {
    const kw = keyword || document.getElementById('searchInput').value.trim();
    if (!kw) { setStatus('검색어를 입력해주세요.', 'error'); document.getElementById('searchInput').focus(); return; }

    clearMarkers(); closeInfo();
    document.getElementById('viewSearch').innerHTML = '';
    showView('search', `"${kw}" 검색 결과`);
    setStatus('검색 중…', 'loading');

    // 검색 옵션: '전체'칩(index 0)이거나 forceLoc가 없으면 location 파라미터 생략
    const opts = { sort: kakao.maps.services.SortBy.DISTANCE };
    if (forceLoc) {
      opts.location = forceLoc;
    } else if (activeChipIdx > 0) {
      const r = REGIONS[activeChipIdx];
      opts.location = new kakao.maps.LatLng(r.lat, r.lng);
    }
    // '전체' 선택 시 opts에 location 없음 → 카카오가 전국 키워드 검색

    ps.keywordSearch(kw, handleResult, opts);
  }

  function handleResult(data, status) {
    const sec = document.getElementById('viewSearch');
    if (status !== kakao.maps.services.Status.OK) {
      setStatus('결과를 찾지 못했어요.', 'error');
      sec.innerHTML = `<div class="folder-view-empty"><div class="e-ico">😕</div><p>검색 결과가 없어요.<br/>다른 키워드를 입력해보세요.</p></div>`;
      return;
    }

    setStatus(`${data.length}곳을 찾았어요 ✓`, 'success');
    const bounds = new kakao.maps.LatLngBounds();

    data.forEach((place, idx) => {
      const pos   = new kakao.maps.LatLng(place.y, place.x);
      const emoji = getEmoji(place.category_name);
      bounds.extend(pos);

      // 이모지 마커 — DOM 요소 직접 생성
      const mEl = document.createElement('div');
      mEl.className = 'emoji-marker'; mEl.textContent = emoji;
      mEl.addEventListener('click', e => {
        e.stopPropagation();
        map.panTo(pos); showInfo(place, pos); highlightCard(idx);
      });
      const mOv = new kakao.maps.CustomOverlay({ position:pos, content:mEl, yAnchor:1.1, zIndex:5 });
      mOv.setMap(map); markerOverlays.push(mOv);

      // 결과 카드
      const card = document.createElement('div');
      card.className = 'result-card'; card.dataset.idx = idx;
      card.style.animationDelay = `${idx * 0.04}s`;

      const addr = place.road_address_name || place.address_name || '주소 없음';
      const cat  = place.category_name ? place.category_name.split(' > ').pop() : '분류 없음';
      const saved = isPlaceSaved(place.id);

      card.innerHTML = `
        <span class="card-num">#${idx+1}</span>
        <button class="save-btn ${saved?'saved':''}" data-pidx="${idx}" title="${saved?'저장됨':'저장하기'}">${saved?'🔖':'🔖'}</button>
        <div class="card-name">${emoji} ${place.place_name}</div>
        <div class="card-rows">
          <div class="card-row"><span class="ri">📌</span><span>${addr}</span></div>
          <div class="card-row"><span class="ri">📞</span><span>${place.phone||'전화번호 없음'}</span></div>
          <div class="card-row"><span class="ri">🏷️</span><span>${cat}</span></div>
        </div>`;

      // 카드 클릭 (저장 버튼 영역 제외)
      card.addEventListener('click', e => {
        if (e.target.closest('.save-btn')) return;
        map.panTo(pos); showInfo(place, pos); highlightCard(idx);
      });

      // 저장 버튼 클릭
      card.querySelector('.save-btn').addEventListener('click', e => {
        e.stopPropagation();
        openSavePicker(place);
      });

      sec.appendChild(card);
    });

    map.setBounds(bounds);
  }

  function highlightCard(idx) {
    document.querySelectorAll('.result-card').forEach(c => c.classList.remove('active'));
    const t = document.querySelector(`.result-card[data-idx="${idx}"]`);
    if (t) { t.classList.add('active'); t.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
  }

  document.getElementById('searchBtn').addEventListener('click', () => runSearch());
  document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key==='Enter') runSearch(); });
  kakao.maps.event.addListener(map, 'click', () => {
    closeInfo();
    document.querySelectorAll('.result-card').forEach(c => c.classList.remove('active'));
  });

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     9. 폴더 관리
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function renderFolderGrid() {
    const grid = document.getElementById('folderGrid');
    grid.innerHTML = '';
    const folders = loadFolders();
    const saved   = loadSaved();

    if (folders.length === 0) {
      const hint = document.createElement('div');
      hint.style.gridColumn = '1 / -1';
      hint.innerHTML = `<div class="folder-empty"><div class="fe-ico">📂</div><p>아직 저장한 장소가 없어요.<br/>검색 후 🔖 버튼으로 저장해보세요.</p></div>`;
      grid.appendChild(hint);
    } else {
      folders.forEach(f => {
        const count = saved.filter(s => s.folderId === f.id).length;
        const card  = document.createElement('div');
        card.className = 'folder-card';
        card.style.background = f.color;

        // 폴더 삭제 버튼
        const delBtn = document.createElement('div');
        delBtn.className = 'folder-del'; delBtn.textContent = '✕';
        delBtn.addEventListener('click', e => {
          e.stopPropagation();
          if (confirm(`'${f.name}' 폴더를 삭제할까요?\n(저장된 장소도 함께 삭제됩니다)`)) {
            let fls = loadFolders().filter(x => x.id !== f.id);
            let svd = loadSaved().filter(x => x.folderId !== f.id);
            saveFolders(fls); saveSaved(svd);
            renderFolderGrid();
          }
        });

        card.innerHTML = `
          <div class="folder-ico">${f.icon}</div>
          <div class="folder-name">${f.name}</div>
          <div class="folder-count">${count}곳</div>`;
        card.appendChild(delBtn);
        card.addEventListener('click', () => openFolderView(f.id));
        grid.appendChild(card);
      });
    }

    // 새 폴더 카드 (항상 끝에)
    const addCard = document.createElement('div');
    addCard.className = 'add-folder-card';
    addCard.innerHTML = `<div class="add-ico">+</div><div class="add-lbl">새 폴더</div>`;
    addCard.addEventListener('click', openCreateFolder);
    grid.appendChild(addCard);
  }

  /* 폴더 내용 뷰 열기 */
  function openFolderView(folderId) {
    currentFolderId = folderId;
    const folder  = loadFolders().find(f => f.id === folderId);
    const places  = loadSaved().filter(s => s.folderId === folderId);
    const sec     = document.getElementById('viewFolder');
    sec.innerHTML = '';

    clearMarkers(); closeInfo();

    if (!folder) return;
    showView('folder', `${folder.icon} ${folder.name}`);

    if (places.length === 0) {
      sec.innerHTML = `<div class="folder-view-empty"><div class="e-ico">${folder.icon}</div><p>아직 저장된 장소가 없어요.<br/>검색 후 🔖 버튼으로 저장해보세요.</p></div>`;
      return;
    }

    setStatus(`${places.length}곳이 저장돼 있어요`, 'success');
    const bounds = new kakao.maps.LatLngBounds();

    places.forEach((sp, idx) => {
      const pos   = new kakao.maps.LatLng(sp.lat, sp.lng);
      const emoji = getEmoji(sp.category_name);
      bounds.extend(pos);

      // 마커
      const mEl = document.createElement('div');
      mEl.className = 'emoji-marker'; mEl.textContent = emoji;
      mEl.addEventListener('click', e => {
        e.stopPropagation();
        map.panTo(pos);
        showInfo({ place_name:sp.place_name, road_address_name:sp.road_address_name, address_name:sp.address_name, phone:sp.phone }, pos);
      });
      const mOv = new kakao.maps.CustomOverlay({ position:pos, content:mEl, yAnchor:1.1, zIndex:5 });
      mOv.setMap(map); markerOverlays.push(mOv);

      // 저장 카드
      const card = document.createElement('div');
      card.className = 'saved-place-card';
      card.style.animationDelay = `${idx * 0.04}s`;

      const delBtn = document.createElement('button');
      delBtn.className = 'sp-del'; delBtn.textContent = '🗑️';
      delBtn.title = '저장 삭제';
      delBtn.addEventListener('click', e => {
        e.stopPropagation();
        let svd = loadSaved().filter(s => s.id !== sp.id);
        saveSaved(svd);
        openFolderView(folderId); // 뷰 새로고침
      });

      card.innerHTML = `
        <div class="sp-name">${emoji} ${sp.place_name}</div>
        <div class="sp-addr">📌 ${sp.road_address_name || sp.address_name || '주소 없음'}</div>
        <div class="sp-cat">🏷️ ${sp.category_name ? sp.category_name.split(' > ').pop() : '분류 없음'}</div>`;
      card.appendChild(delBtn);
      card.addEventListener('click', e => {
        if (e.target.closest('.sp-del')) return;
        map.panTo(pos);
        showInfo({ place_name:sp.place_name, road_address_name:sp.road_address_name, address_name:sp.address_name, phone:sp.phone }, pos);
      });
      sec.appendChild(card);
    });

    map.setBounds(bounds);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     10. 저장 피커 모달
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  let pendingPlace = null; // 저장 대기 중인 장소

  function openSavePicker(place) {
    pendingPlace = place;
    document.getElementById('pickerPlaceName').textContent = '📍 ' + place.place_name;
    renderPickerFolders();
    openModal('savePickerModal');
  }

  function renderPickerFolders() {
    const wrap    = document.getElementById('pickerFolders');
    const folders = loadFolders();
    const saved   = loadSaved();
    wrap.innerHTML = '';

    if (folders.length === 0) {
      wrap.innerHTML = `<p style="font-size:.75rem;color:var(--t3);text-align:center;padding:10px 0">아직 폴더가 없어요.</p>`;
      return;
    }

    folders.forEach(f => {
      const count = saved.filter(s => s.folderId === f.id).length;
      const row   = document.createElement('div');
      row.className = 'picker-folder-row';
      row.innerHTML = `
        <div class="pf-dot" style="background:${f.color}">${f.icon}</div>
        <span class="pf-name">${f.name}</span>
        <span class="pf-count">${count}곳</span>`;
      row.addEventListener('click', () => {
        saveToFolder(f.id);
        closeModal('savePickerModal');
      });
      wrap.appendChild(row);
    });
  }

  function saveToFolder(folderId) {
    if (!pendingPlace) return;
    const p = pendingPlace;
    let saved = loadSaved();

    // 이미 저장된 경우 중복 방지 (같은 폴더 내)
    if (saved.some(s => s.kakao_id === p.id && s.folderId === folderId)) {
      alert('이미 이 폴더에 저장된 장소예요!'); return;
    }

    saved.push({
      id:            Date.now(),
      folderId:      folderId,
      kakao_id:      p.id,
      place_name:    p.place_name,
      road_address_name: p.road_address_name || '',
      address_name:  p.address_name || '',
      phone:         p.phone || '',
      category_name: p.category_name || '',
      lat:           parseFloat(p.y),
      lng:           parseFloat(p.x),
      savedAt:       Date.now()
    });
    saveSaved(saved);

    // 저장 버튼 상태 업데이트
    document.querySelectorAll('.save-btn').forEach(btn => {
      const idx  = parseInt(btn.dataset.pidx);
      // 현재 viewSearch의 result-card 기준으로 데이터 재확인
    });

    // 해당 카드의 저장 버튼 스타일 업데이트
    const cards = document.querySelectorAll('.result-card');
    cards.forEach(card => {
      const bkBtn = card.querySelector('.save-btn');
      // place id 매칭이 어려우므로 전체 재렌더 대신 부드럽게 처리
    });

    pendingPlace = null;
    alert(`✅ '${loadFolders().find(f=>f.id===folderId)?.name}' 폴더에 저장됐어요!`);
  }

  document.getElementById('pickerNewBtn').addEventListener('click', () => {
    closeModal('savePickerModal');
    openCreateFolder(true); // true = 만들고 나서 다시 피커 오픈
  });
  document.getElementById('pickerCancelBtn').addEventListener('click', () => {
    pendingPlace = null;
    closeModal('savePickerModal');
  });

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     11. 폴더 생성 모달
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  let cfSelectedIcon  = FOLDER_ICONS[0];
  let cfSelectedColor = FOLDER_COLORS[4]; // 기본 파란색
  let afterCreateOpenPicker = false; // 생성 후 피커 재오픈 여부

  function buildCreateFolderUI() {
    // 아이콘 그리드
    const ig = document.getElementById('cfIconGrid');
    ig.innerHTML = '';
    FOLDER_ICONS.forEach(ico => {
      const el = document.createElement('button');
      el.className = 'ico-opt' + (ico === cfSelectedIcon ? ' sel' : '');
      el.textContent = ico;
      el.addEventListener('click', () => {
        ig.querySelectorAll('.ico-opt').forEach(e => e.classList.remove('sel'));
        el.classList.add('sel');
        cfSelectedIcon = ico;
      });
      ig.appendChild(el);
    });

    // 색상 스와치
    const cs = document.getElementById('cfColorSwatches');
    cs.innerHTML = '';
    FOLDER_COLORS.forEach(color => {
      const el = document.createElement('div');
      el.className = 'swatch' + (color === cfSelectedColor ? ' sel' : '');
      el.style.background = color;
      el.addEventListener('click', () => {
        cs.querySelectorAll('.swatch').forEach(e => e.classList.remove('sel'));
        el.classList.add('sel');
        cfSelectedColor = color;
      });
      cs.appendChild(el);
    });
  }

  function openCreateFolder(reopenPicker = false) {
    afterCreateOpenPicker = !!reopenPicker;
    cfSelectedIcon  = FOLDER_ICONS[0];
    cfSelectedColor = FOLDER_COLORS[4];
    document.getElementById('cfNameInput').value = '';
    buildCreateFolderUI();
    openModal('createFolderModal');
  }

  document.getElementById('cfCreateBtn').addEventListener('click', () => {
    const name = document.getElementById('cfNameInput').value.trim();
    if (!name) { document.getElementById('cfNameInput').focus(); return; }

    let folders = loadFolders();
    folders.push({ id: Date.now(), name, icon: cfSelectedIcon, color: cfSelectedColor });
    saveFolders(folders);
    closeModal('createFolderModal');
    renderFolderGrid();

    if (afterCreateOpenPicker && pendingPlace) {
      setTimeout(() => { renderPickerFolders(); openModal('savePickerModal'); }, 200);
    }
  });
  document.getElementById('cfCancelBtn').addEventListener('click', () => {
    if (afterCreateOpenPicker && pendingPlace) {
      closeModal('createFolderModal');
      setTimeout(() => { renderPickerFolders(); openModal('savePickerModal'); }, 200);
    } else {
      closeModal('createFolderModal');
    }
  });

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     12. 모달 열기/닫기 공통
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function openModal(id)  { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  // 배경 클릭으로 닫기
  ['curateModal','savePickerModal','createFolderModal'].forEach(id => {
    document.getElementById(id).addEventListener('click', e => {
      if (e.target.id === id) closeModal(id);
    });
  });
  window.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      ['curateModal','savePickerModal','createFolderModal'].forEach(closeModal);
    }
  });

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     13. 큐레이션 캐러셀
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  const track    = document.getElementById('sliderTrack');
  const dotWrap  = document.getElementById('dotWrap');
  const progBar  = document.getElementById('progBar');
  let curIdx     = 0;
  let autoTimer  = null;
  const AUTO_SEC = 10;

  CURATION.forEach((c, i) => {
    // 슬라이드 카드
    const card = document.createElement('div');
    card.className = 'curate-card';
    const bg  = document.createElement('div'); bg.className = 'card-bg'; bg.style.background = c.gradient;
    const ov  = document.createElement('div'); ov.className = 'card-ov';
    const cnt = document.createElement('div'); cnt.className = 'card-cnt';
    cnt.innerHTML = `
      <span class="card-tag" style="background:${c.tagBg};color:${c.tagColor}">${c.tag}</span>
      <div class="card-pname">${c.name}</div>
      <div class="card-region">📍 ${c.region}</div>
      <div class="card-desc-p">${c.desc}</div>`;
    card.appendChild(bg); card.appendChild(ov); card.appendChild(cnt);
    card.addEventListener('click', () => openCurateModal(i));
    card.addEventListener('mousedown', e => e.preventDefault());
    track.appendChild(card);

    // 도트
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => { slideTo(i); startAuto(); });
    dotWrap.appendChild(dot);
  });

  function slideTo(n) {
    curIdx = (n + CURATION.length) % CURATION.length;
    track.style.transform = `translateX(-${curIdx * 100}%)`;
    dotWrap.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===curIdx));
    restartProg();
  }

  function restartProg() {
    progBar.style.transition = 'none';
    progBar.style.width = '0%';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      progBar.style.transition = `width ${AUTO_SEC}s linear`;
      progBar.style.width = '100%';
    }));
  }

  function startAuto() {
    clearInterval(autoTimer);
    autoTimer = setInterval(() => slideTo(curIdx + 1), AUTO_SEC * 1000);
    restartProg();
  }

  document.getElementById('btnPrev').addEventListener('click', () => { slideTo(curIdx - 1); startAuto(); });
  document.getElementById('btnNext').addEventListener('click', () => { slideTo(curIdx + 1); startAuto(); });

  // 마우스 드래그
  let dragX = 0, dragging = false;
  const sOuter = document.getElementById('sliderOuter');
  sOuter.addEventListener('mousedown', e => { dragging = true; dragX = e.clientX; });
  window.addEventListener('mouseup', e => {
    if (!dragging) return; dragging = false;
    const d = dragX - e.clientX;
    if (Math.abs(d) > 35) { slideTo(d > 0 ? curIdx+1 : curIdx-1); startAuto(); }
  });

  // 터치 스와이프
  let tX = 0;
  sOuter.addEventListener('touchstart', e => { tX = e.touches[0].clientX; }, { passive:true });
  sOuter.addEventListener('touchend', e => {
    const d = tX - e.changedTouches[0].clientX;
    if (Math.abs(d) > 35) { slideTo(d > 0 ? curIdx+1 : curIdx-1); startAuto(); }
  });

  startAuto(); // 자동 슬라이드 시작

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     14. 큐레이션 모달
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  let activeCuration = null;

  function openCurateModal(idx) {
    activeCuration = CURATION[idx];
    const c = activeCuration;

    document.getElementById('mHeroBg').style.background = c.gradient;
    document.getElementById('mEmoji').textContent        = c.emoji;
    const tagEl = document.getElementById('mTag');
    tagEl.textContent = c.tag; tagEl.style.background = c.tagBg; tagEl.style.color = c.tagColor;
    document.getElementById('mPname').textContent   = c.name;
    document.getElementById('mPregion').textContent = '📍 ' + c.region;
    document.getElementById('mDesc').textContent    = c.desc;

    const info = document.getElementById('mInfo');
    info.innerHTML = '';
    c.tips.forEach(t => {
      const row = document.createElement('div'); row.className = 'm-info-row';
      row.innerHTML = `<span class="m-ico">${t.ico}</span><span class="m-label">${t.label}</span><span class="m-val">${t.val}</span>`;
      info.appendChild(row);
    });

    openModal('curateModal');
    // 자동 슬라이드 정지
    clearInterval(autoTimer);
    progBar.style.transition = 'none';
    progBar.style.width = '0%';
  }

  document.getElementById('mCloseBtn').addEventListener('click', () => {
    closeModal('curateModal');
    activeCuration = null;
    startAuto();
  });

  // ★ 핵심 수정: location을 map.getCenter()가 아닌 region 데이터에서 직접 가져옴
  document.getElementById('mSearchBtn').addEventListener('click', () => {
    if (!activeCuration) return;
    const c = activeCuration;
    closeModal('curateModal');

    // 1. 해당 지역 칩 활성화 + 지도 이동
    activateChip(c.regionIdx);

    // 2. 검색어 채우기
    document.getElementById('searchInput').value = c.keyword;

    // 3. 해당 지역의 위치를 직접 참조해서 검색 (map.getCenter() 의존 X)
    const region   = REGIONS[c.regionIdx];
    const forceLoc = new kakao.maps.LatLng(region.lat, region.lng);
    runSearch(c.keyword, forceLoc);

    activeCuration = null;
  });

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     15. 초기 렌더링
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  renderFolderGrid();
  showView('home');
  </script>
</body>
</html>
