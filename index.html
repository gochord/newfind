<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NewFind</title>
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=6ac811cfe03fac96b5d6699028337d78&libraries=services"></script>
  <link rel="stylesheet" href="pretendardvariable.css" />
  <style>
    /* ━━━━━━━━ CSS 변수 ━━━━━━━━ */
    :root {
      --bg: #ffffff;
      --bg-subtle: #f8f8f8;
      --surface: #ffffff;
      --border: #e0e0e0;
      --border-soft: #efefef;
      --border-strong: #bebebe;

      /* 모노크롬 액센트 */
      --accent: #1a1a1a;
      --accent-l: #f0f0f0;
      --accent-d: rgba(0,0,0,.06);
      --accent-mid: #555555;

      --red: #cc2200;
      --green: #2a7a2a;
      --orange: #c07000;

      --t1: #111111;
      --t2: #555555;
      --t3: #999999;
      --t4: #cccccc;

      --sh-sm: 0 1px 4px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --sh-md: 0 4px 18px rgba(0,0,0,.09), 0 1px 4px rgba(0,0,0,.05);
      --sh-lg: 0 16px 48px rgba(0,0,0,.14), 0 4px 14px rgba(0,0,0,.07);
      --r: 0px;
      --r-md: 2px;
      --r-lg: 4px;
    }
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Pretendard Variable', sans-serif;
      background: var(--bg);
      color: var(--t1);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ━━━━━━━━ 헤더 ━━━━━━━━ */
    header {
      flex-shrink: 0;
      height: 54px;
      background: #ffffff;
      border-bottom: 1.5px solid var(--t1);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      z-index: 200;
    }
    .h-logo-block {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex: 1;
    }
    .h-logo-main {
      font-family: 'Pretendard Variable', sans-serif;
      font-size: 1.35rem;
      font-weight: 900;
      letter-spacing: -.01em;
      color: var(--t1);
      line-height: 1;
    }
    .h-logo-dot {
      width: 5px;
      height: 5px;
      background: var(--t1);
      border-radius: 50%;
      display: inline-block;
      margin-bottom: 3px;
    }
    .h-sub {
      font-size: .6rem;
      color: var(--t3);
      letter-spacing: .1em;
      text-transform: uppercase;
      font-weight: 400;
    }
    .h-home-btn {
      width: 32px;
      height: 32px;
      border: 1.5px solid var(--border-strong);
      border-radius: 0;
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .85rem;
      transition: all .14s;
      flex-shrink: 0;
      color: var(--t2);
    }
    .h-home-btn:hover { border-color: var(--t1); background: var(--accent-d); }
    .h-home-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ━━━━━━━━ 레이아웃 ━━━━━━━━ */
    .layout { flex: 1; display: grid; grid-template-columns: 360px 1fr; overflow: hidden; }

    /* ━━━━━━━━ 사이드바 ━━━━━━━━ */
    .sidebar {
      background: var(--bg);
      border-right: 1.5px solid var(--t1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 검색 패널 */
    .search-panel {
      background: var(--surface);
      padding: 14px 14px 12px;
      border-bottom: 1px solid var(--border-soft);
      flex-shrink: 0;
    }
    .search-row { display: flex; gap: 7px; align-items: center; }
    .s-wrap { flex: 1; position: relative; }
    .s-ico {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      font-size: .7rem; color: var(--t3); pointer-events: none;
    }
    .s-wrap input {
      width: 100%;
      padding: 9px 11px 9px 30px;
      background: var(--bg-subtle);
      border: 1.5px solid var(--border);
      border-radius: 0;
      font-size: .83rem;
      font-family: 'Pretendard Variable', sans-serif;
      color: var(--t1);
      outline: none;
      transition: border-color .18s, background .18s;
      letter-spacing: -.01em;
    }
    .s-wrap input::placeholder { color: var(--t3); }
    .s-wrap input:focus { background: var(--surface); border-color: var(--t1); }
    .s-btn {
      padding: 9px 16px;
      background: var(--accent);
      border: none;
      border-radius: 0;
      color: #fff;
      font-size: .78rem;
      font-weight: 700;
      font-family: 'Pretendard Variable', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: .04em;
      transition: background .15s, transform .1s;
    }
    .s-btn:hover { background: #333; }
    .s-btn:active { transform: scale(.96); }

    /* 지역 칩 */
    .region-wrap { margin-top: 10px; }
    .region-label {
      font-size: .6rem;
      font-weight: 700;
      color: var(--t3);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .chips { display: flex; gap: 5px; flex-wrap: wrap; }
    .chip {
      padding: 4px 10px;
      border-radius: 0;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: .69rem;
      font-weight: 500;
      color: var(--t2);
      font-family: 'Pretendard Variable', sans-serif;
      cursor: pointer;
      transition: all .14s;
      white-space: nowrap;
      letter-spacing: -.01em;
    }
    .chip:hover { border-color: var(--t1); color: var(--t1); background: var(--accent-d); }
    .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* 뷰 내비 바 */
    .view-nav {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border-soft);
      flex-shrink: 0;
    }
    .view-nav.show { display: flex; }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border: 1px solid var(--border-strong);
      border-radius: 0;
      background: none;
      font-size: .7rem;
      font-weight: 700;
      color: var(--t2);
      font-family: 'Pretendard Variable', sans-serif;
      cursor: pointer;
      letter-spacing: .04em;
      transition: all .14s;
    }
    .back-btn:hover { border-color: var(--t1); color: var(--t1); }
    .view-nav-title {
      font-size: .78rem;
      font-weight: 600;
      color: var(--t1);
      flex: 1;
      text-align: center;
      font-family: 'Pretendard Variable', sans-serif;
    }

    /* 상태 바 */
    .status-bar {
      padding: 7px 14px;
      font-size: .69rem;
      font-weight: 500;
      color: var(--t3);
      background: var(--bg-subtle);
      border-bottom: 1px solid var(--border-soft);
      min-height: 30px;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
      letter-spacing: .01em;
    }
    .status-bar.loading { color: var(--accent-mid); }
    .status-bar.error { color: var(--red); }
    .status-bar.success { color: var(--green); }

    /* 스크롤 영역 */
    .scroll-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .scroll-area::-webkit-scrollbar { width: 3px; }
    .scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 0; }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       홈 뷰
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    #viewHome { display: block; }
    #viewSearch, #viewFolder { display: none; }

    .home-sec { padding: 14px 14px 4px; }
    .sec-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-soft);
    }
    .sec-title {
      font-family: 'Pretendard Variable', sans-serif;
      font-size: .82rem;
      font-weight: 700;
      color: var(--t1);
      letter-spacing: -.01em;
    }
    .sec-sub { font-size: .65rem; color: var(--t3); margin-top: 2px; }
    .sec-action {
      font-size: .68rem;
      color: var(--t2);
      font-weight: 700;
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Pretendard Variable', sans-serif;
      padding: 2px 4px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .sec-action:hover { color: var(--t1); text-decoration: underline; }

    /* 슬라이더 */
    .slider-outer {
      position: relative;
      overflow: hidden;
      border-radius: 0;
      box-shadow: var(--sh-md);
      user-select: none;
      cursor: grab;
      border: 1px solid var(--border);
    }
    .slider-outer:active { cursor: grabbing; }
    .slider-track { display: flex; transition: transform .42s cubic-bezier(.4,0,.2,1); will-change: transform; }
    .curate-card {
      min-width: 100%;
      height: 168px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .card-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      transition: transform .5s ease;
    }
    .curate-card:hover .card-bg { transform: scale(1.03); }
    /* 흑백 필터로 배경 이미지를 모노크롬처럼 */
    .card-bg { filter: grayscale(30%) contrast(1.05); }
    .card-ov {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 15%, rgba(0,0,0,.15) 50%, rgba(0,0,0,.72) 100%);
    }
    .card-cnt { position: relative; z-index: 2; padding: 10px 14px 13px; }
    .card-tag {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 0;
      font-size: .58rem;
      font-weight: 700;
      margin-bottom: 5px;
      background: rgba(255,255,255,.18) !important;
      color: rgba(255,255,255,.9) !important;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,.3);
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .card-pname {
      font-family: 'Pretendard Variable', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      text-shadow: 0 1px 5px rgba(0,0,0,.35);
      letter-spacing: -.01em;
    }
    .card-region { font-size: .66rem; color: rgba(255,255,255,.75); margin-top: 3px; }
    .card-desc-p {
      font-size: .67rem;
      color: rgba(255,255,255,.65);
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .slider-ctrl {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      padding: 0 2px;
    }
    .arrows { display: flex; gap: 4px; }
    .arr-btn {
      width: 26px; height: 26px;
      border-radius: 0;
      border: 1px solid var(--border-strong);
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .6rem;
      color: var(--t2);
      transition: all .14s;
    }
    .arr-btn:hover { border-color: var(--t1); color: var(--t1); background: var(--accent-d); }
    .arr-btn:active { transform: scale(.9); }
    .dots { display: flex; gap: 4px; align-items: center; }
    .dot {
      width: 5px; height: 5px;
      border-radius: 0;
      background: var(--border-strong);
      cursor: pointer;
      transition: all .28s cubic-bezier(.4,0,.2,1);
    }
    .dot.active { width: 16px; background: var(--t1); }
    .prog-wrap {
      flex: 1; height: 1.5px;
      background: var(--border);
      margin: 0 10px;
      overflow: hidden;
    }
    .prog-bar { height: 100%; background: var(--t1); width: 0%; }

    /* ━━━━━━━━ 폴더 그리드 (홈) ━━━━━━━━ */
    .folder-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 2px 0 14px;
    }
    .folder-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 13px 6px 11px;
      border-radius: 0;
      cursor: pointer;
      position: relative;
      transition: transform .14s, box-shadow .14s;
      box-shadow: var(--sh-sm);
    }
    .folder-card:hover { transform: translateY(-2px); box-shadow: var(--sh-md); }
    .folder-card:active { transform: scale(.96); }
    .folder-ico { font-size: 1.55rem; line-height: 1; }
    .folder-name {
      font-size: .69rem;
      font-weight: 600;
      color: #fff;
      text-align: center;
      line-height: 1.3;
      word-break: keep-all;
      font-family: 'Pretendard Variable', sans-serif;
    }
    .folder-count { font-size: .6rem; color: rgba(255,255,255,.72); font-weight: 500; }
    .folder-del {
      position: absolute; top: 5px; right: 5px;
      width: 18px; height: 18px;
      border-radius: 0;
      background: rgba(0,0,0,.22);
      color: #fff;
      font-size: .55rem;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .12s;
    }
    .folder-card:hover .folder-del { display: flex; }
    .folder-del:hover { background: rgba(200,40,20,.7); }

    .add-folder-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 13px 6px 11px;
      border-radius: 0;
      cursor: pointer;
      border: 1.5px dashed var(--border);
      transition: all .14s;
    }
    .add-folder-card:hover { border-color: var(--t1); background: var(--accent-d); }
    .add-folder-card .add-ico { font-size: 1.3rem; color: var(--t3); }
    .add-folder-card .add-lbl {
      font-size: .66rem;
      font-weight: 700;
      color: var(--t3);
      letter-spacing: .04em;
    }
    .add-folder-card:hover .add-ico,
    .add-folder-card:hover .add-lbl { color: var(--t1); }

    .folder-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      padding: 20px 0 8px;
      opacity: .45;
    }
    .folder-empty .fe-ico { font-size: 1.8rem; }
    .folder-empty p {
      font-size: .73rem;
      color: var(--t3);
      text-align: center;
      line-height: 1.75;
    }

    /* ━━━━━━━━ 검색 결과 뷰 ━━━━━━━━ */
    #viewSearch, #viewFolder { padding: 8px 10px 14px; }
    .result-card {
      padding: 11px 13px;
      margin-bottom: 5px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0;
      cursor: pointer;
      box-shadow: var(--sh-sm);
      position: relative;
      transition: border-color .15s, box-shadow .15s, transform .12s;
      animation: cardIn .2s ease both;
    }
    @keyframes cardIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .result-card:hover { border-color: var(--t1); box-shadow: var(--sh-md); transform: translateY(-1px); }
    .result-card.active {
      border-color: var(--t1);
      background: var(--accent-l);
      box-shadow: 0 0 0 2px rgba(0,0,0,.1);
    }
    .card-num {
      position: absolute; top: 9px; right: 38px;
      font-size: .62rem;
      font-weight: 700;
      color: var(--t4);
      letter-spacing: .03em;
    }
    .card-name {
      font-family: 'Pretendard Variable', sans-serif;
      font-size: .86rem;
      font-weight: 700;
      margin-bottom: 7px;
      padding-right: 58px;
      line-height: 1.4;
      letter-spacing: -.01em;
    }
    .card-rows { display: flex; flex-direction: column; gap: 3px; }
    .card-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      font-size: .7rem;
      color: var(--t2);
      line-height: 1.55;
    }
    .card-row .ri { flex-shrink: 0; font-size: .73rem; line-height: 1.55; }

    .save-btn {
      position: absolute; top: 8px; right: 10px;
      width: 26px; height: 26px;
      border-radius: 0;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .75rem;
      transition: all .14s;
      z-index: 2;
    }
    .save-btn:hover { border-color: var(--t1); background: var(--accent-d); }
    .save-btn.saved { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ━━━━━━━━ 폴더 내용 뷰 ━━━━━━━━ */
    .saved-place-card {
      padding: 10px 12px;
      margin-bottom: 5px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0;
      cursor: pointer;
      box-shadow: var(--sh-sm);
      position: relative;
      transition: border-color .15s, box-shadow .15s, transform .12s;
      animation: cardIn .2s ease both;
    }
    .saved-place-card:hover { border-color: var(--t1); box-shadow: var(--sh-md); transform: translateY(-1px); }
    .sp-name {
      font-family: 'Pretendard Variable', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      margin-bottom: 5px;
      padding-right: 30px;
      line-height: 1.4;
      letter-spacing: -.01em;
    }
    .sp-addr { font-size: .71rem; color: var(--t2); line-height: 1.5; margin-bottom: 2px; }
    .sp-cat { font-size: .67rem; color: var(--t3); }
    .sp-del {
      position: absolute; top: 8px; right: 9px;
      width: 22px; height: 22px;
      border-radius: 0;
      background: var(--bg-subtle);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .65rem;
      color: var(--t3);
      transition: all .12s;
    }
    .sp-del:hover { background: rgba(200,40,20,.1); color: var(--red); }
    .folder-view-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 40px 20px;
      opacity: .45;
    }
    .folder-view-empty .e-ico { font-size: 1.8rem; }
    .folder-view-empty p { font-size: .76rem; color: var(--t3); text-align: center; line-height: 1.7; }

    /* ━━━━━━━━ 지도 ━━━━━━━━ */
    #map { width: 100%; height: 100%; filter: grayscale(18%); }

    /* ━━━━━━━━ 이모지 마커 ━━━━━━━━ */
    .emoji-marker {
      font-size: 1.75rem;
      line-height: 1;
      cursor: pointer;
      filter: drop-shadow(0 3px 5px rgba(0,0,0,.2)) grayscale(10%);
      transition: transform .15s, filter .15s;
      user-select: none;
      display: block;
    }
    .emoji-marker:hover {
      transform: scale(1.3) translateY(-3px);
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.22)) grayscale(0%);
    }

    /* ━━━━━━━━ 인포 팝업 ━━━━━━━━ */
    .info-bubble {
      background: var(--surface);
      border-radius: 0;
      padding: 12px 14px 11px;
      min-width: 185px;
      max-width: 240px;
      box-shadow: var(--sh-lg);
      border: 1.5px solid var(--t1);
      position: relative;
      animation: popIn .17s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn { from { opacity: 0; transform: scale(.9) translateY(5px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .info-x {
      position: absolute; top: 7px; right: 8px;
      width: 18px; height: 18px;
      background: var(--bg-subtle);
      border-radius: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .62rem; color: var(--t2);
      cursor: pointer;
      transition: background .12s;
    }
    .info-x:hover { background: var(--border); }
    .info-name {
      font-family: 'Pretendard Variable', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      margin-bottom: 4px;
      padding-right: 20px;
      line-height: 1.4;
      letter-spacing: -.01em;
    }
    .info-addr { font-size: .71rem; color: var(--t2); line-height: 1.55; }

    /* 큐레이션 모달 */

      padding: 2px 8px;

      font-weight: 700;
      margin-bottom: 5px;
      background: rgba(255,255,255,.15) !important;
      color: rgba(255,255,255,.9) !important;
      border: 1px solid rgba(255,255,255,.3);
      backdrop-filter: blur(6px);
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .modal-pname {
      font-family: 'Pretendard Variable', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.25;

    }
    .modal-pregion { font-size: .7rem; color: rgba(255,255,255,.78); margin-top: 2px; }
    .modal-body { padding: 16px 18px 18px; }
    .modal-desc { font-size: .81rem; color: var(--t2); line-height: 1.8; margin-bottom: 14px; }
    .modal-info { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
    .m-info-row { display: flex; gap: 9px; align-items: flex-start; }
    .m-ico { font-size: .8rem; flex-shrink: 0; margin-top: 1px; }
    .m-label {
      font-size: .66rem;
      color: var(--t3);
      font-weight: 700;
      width: 42px;
      flex-shrink: 0;
      margin-top: 2px;
      letter-spacing: .03em;
    }
    .m-val { font-size: .78rem; color: var(--t1); font-weight: 500; line-height: 1.5; }
    .modal-btns { display: flex; gap: 7px; }
    .m-btn {
      flex: 1;
      padding: 10px;
      border-radius: 0;
      font-size: .78rem;
      font-weight: 700;
      font-family: 'Pretendard Variable', sans-serif;
      cursor: pointer;
      border: none;
      transition: all .14s;
      letter-spacing: .01em;
    }
    .m-btn.primary { background: var(--accent); color: #fff; }
    .m-btn.primary:hover { background: #333; }
    .m-btn.secondary {
      background: var(--bg-subtle);
      color: var(--t1);
      border: 1px solid var(--border-strong);
    }
    .m-btn.secondary:hover { border-color: var(--t1); background: var(--accent-d); }
    .m-btn:active { transform: scale(.96); }

    /* 저장 폴더 선택 모달 */
    #savePickerModal .modal-box { width: 320px; max-width: 92vw; padding: 18px; }
    .picker-title {
      font-family: 'Pretendard Variable', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -.01em;
    }
    .picker-sub { font-size: .72rem; color: var(--t3); margin-bottom: 14px; }
    .picker-folders {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 240px;
      overflow-y: auto;
      margin-bottom: 12px;
    }
    .picker-folder-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 11px;
      border-radius: 0;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all .14s;
    }
    .picker-folder-row:hover { border-color: var(--t1); background: var(--accent-d); }
    .pf-dot {
      width: 28px; height: 28px;
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .pf-name { font-size: .81rem; font-weight: 600; flex: 1; }
    .pf-count { font-size: .67rem; color: var(--t3); }
    .picker-new-btn {
      width: 100%;
      padding: 9px;
      border: 1.5px dashed var(--border);
      border-radius: 0;
      background: none;
      font-size: .77rem;
      font-weight: 700;
      color: var(--t3);
      font-family: 'Pretendard Variable', sans-serif;
      cursor: pointer;
      transition: all .14s;
      letter-spacing: .02em;
    }
    .picker-new-btn:hover { border-color: var(--t1); color: var(--t1); }
    .picker-cancel {
      width: 100%;
      margin-top: 6px;
      padding: 8px;
      border: none;
      background: none;
      font-size: .73rem;
      color: var(--t3);
      font-family: 'Pretendard Variable', sans-serif;
      cursor: pointer;
    }

    /* 폴더 생성 모달 */
    #createFolderModal .modal-box { width: 320px; max-width: 92vw; padding: 20px; }
    .cf-title {
      font-family: 'Pretendard Variable', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      margin-bottom: 14px;
      letter-spacing: -.01em;
    }
    .cf-label {
      font-size: .62rem;
      font-weight: 700;
      color: var(--t3);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .cf-input {
      width: 100%;
      padding: 9px 11px;
      border: 1px solid var(--border);
      border-radius: 0;
      font-size: .83rem;
      font-family: 'Pretendard Variable', sans-serif;
      color: var(--t1);
      outline: none;
      margin-bottom: 14px;
      transition: border-color .15s;
    }
    .cf-input:focus { border-color: var(--t1); }
    .icon-grid { display: grid; grid-template-columns: repeat(8,1fr); gap: 5px; margin-bottom: 14px; }
    .ico-opt {
      width: 100%; aspect-ratio: 1;
      border-radius: 0;
      border: 1.5px solid transparent;
      background: var(--bg-subtle);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .95rem;
      transition: all .12s;
    }
    .ico-opt:hover { background: var(--accent-d); border-color: var(--border-strong); }
    .ico-opt.sel { border-color: var(--t1); background: var(--accent-d); }
    .color-swatches { display: flex; gap: 7px; margin-bottom: 18px; flex-wrap: wrap; }
    .swatch {
      width: 28px; height: 28px;
      border-radius: 0;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform .12s, border-color .12s;
    }
    .swatch:hover { transform: scale(1.12); }
    .swatch.sel { border-color: var(--t1); transform: scale(1.08); }
    .cf-btns { display: flex; gap: 7px; }
    .cf-btn {
      flex: 1;
      padding: 9px;
      border-radius: 0;
      font-size: .78rem;
      font-weight: 700;
      font-family: 'Pretendard Variable', sans-serif;
      cursor: pointer;
      border: none;
      transition: all .14s;
      letter-spacing: .02em;
    }
    .cf-btn.primary { background: var(--accent); color: #fff; }
    .cf-btn.primary:hover { background: #333; }
    .cf-btn.secondary { background: var(--bg-subtle); color: var(--t1); border: 1px solid var(--border-strong); }
    .cf-btn.secondary:hover { border-color: var(--t1); }
    .cf-btn:active { transform: scale(.96); }

    /* 섹션 구분선 스타일 */
    .section-rule {
      height: 1px;
      background: var(--border-soft);
      margin: 0 14px;
    }

    /* 모바일 전용 요소는 데스크탑에서 숨김 */
    .mobile-home-scroll,
    .mobile-result-sheet { display: none; }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       모바일 레이아웃
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    @media (max-width: 700px) {
      html, body { height: 100%; overflow: hidden; }

      /* 헤더 */
      header { height: 50px; padding: 0 14px; }
      .h-logo-main { font-size: 1.2rem; }

      /* 레이아웃: 모바일은 세로 스택 */
      .layout {
        display: flex;
        flex-direction: column;
        grid-template-columns: none;
        position: relative;
        overflow: hidden;
      }

      /* ── 사이드바(패널) ── */
      .sidebar {
        border-right: none;
        border-bottom: 1.5px solid var(--t1);
        /* 기본: 홈 화면 풀스크린 */
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 10;
        background: var(--bg);
        transition: transform 0.38s cubic-bezier(.4,0,.2,1);
        transform: translateY(0);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      /* 검색 후: 사이드바를 위로 슬라이드해서 검색창+지역칩 높이만 남김 */
      .sidebar.results-open {
        /* search-panel 높이만큼만 보이도록 슬라이드 업 */
        transform: translateY(calc(-100% + var(--panel-h, 120px)));
        bottom: auto;
        height: 100%;
      }
      /* 결과 열렸을 때 모바일 홈 스크롤 숨김 */
      .sidebar.results-open .mobile-home-scroll {
        display: none;
      }

      /* 지도 */
      #map {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 1;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
      #map.visible {
        opacity: 1;
        pointer-events: all;
      }

      /* 지도 위 결과 패널 (하단 시트) */
      .mobile-result-sheet {
        display: none;
        position: absolute;
        left: 0; right: 0; bottom: 0;
        z-index: 15;
        background: var(--bg);
        border-top: 1.5px solid var(--t1);
        height: 45vh;
        overflow: hidden;
        flex-direction: column;
        box-shadow: 0 -4px 24px rgba(0,0,0,.13);
        transition: transform 0.35s cubic-bezier(.4,0,.2,1);
      }
      .mobile-result-sheet.active {
        display: flex;
      }

      /* 시트 핸들 */
      .sheet-handle-bar {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8px 14px 4px;
        flex-shrink: 0;
        border-bottom: 1px solid var(--border-soft);
        gap: 8px;
        cursor: pointer;
      }
      .sheet-handle {
        width: 36px; height: 4px;
        background: var(--border-strong);
        border-radius: 2px;
      }
      .sheet-handle-title {
        font-size: .75rem;
        font-weight: 700;
        color: var(--t2);
        flex: 1;
        text-align: left;
        letter-spacing: -.01em;
      }
      .sheet-close-btn {
        width: 26px; height: 26px;
        border: 1px solid var(--border-strong);
        background: none;
        border-radius: 0;
        font-size: .7rem;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        color: var(--t2);
        transition: all .14s;
      }
      .sheet-close-btn:hover { border-color: var(--t1); color: var(--t1); }

      .sheet-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 6px 10px 10px;
      }
      .sheet-scroll::-webkit-scrollbar { width: 3px; }
      .sheet-scroll::-webkit-scrollbar-thumb { background: var(--border); }

      /* 모바일에서 상태바, 뷰내비 숨김 (시트에 통합) */
      .mobile-result-sheet .status-bar {
        display: flex;
        margin: 0;
        border-bottom: 1px solid var(--border-soft);
        border-top: none;
        font-size: .69rem;
        padding: 5px 14px;
        flex-shrink: 0;
      }

      /* 사이드바 안의 상태바·뷰내비는 모바일에서 숨김 */
      .sidebar .status-bar,
      .sidebar .view-nav,
      .sidebar .scroll-area { display: none; }

      /* 검색 패널은 항상 표시 */
      .sidebar .search-panel { display: flex; flex-direction: column; flex-shrink: 0; }

      /* 모바일 홈 스크롤 표시 */
      .mobile-home-scroll { display: flex; }

      /* 홈 뷰를 사이드바 스크롤 영역에 올리기 */
      .mobile-home-scroll {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      .mobile-home-scroll::-webkit-scrollbar { width: 3px; }
      .mobile-home-scroll::-webkit-scrollbar-thumb { background: var(--border); }

      /* 폴더 그리드 모바일 */
      .folder-grid { grid-template-columns: repeat(3, 1fr); }

      /* 모달 모바일 */
      #curateModal .modal-box { width: 96vw; }
      #savePickerModal .modal-box,
      #createFolderModal .modal-box { width: 92vw; padding: 16px; }

      /* 아이콘 그리드 모바일 */
      .icon-grid { grid-template-columns: repeat(7, 1fr); }
    }
  </style>
</head>
<body>

  <header>

  <div class="layout">

          <!-- 큐레이션 캐러셀 -->

          <div class="sec-header">
            <div>
              <div class="sec-title">이런 장소는 어때요?</div>
              <div class="sec-sub">카드를 눌러 자세히 보기</div>
            </div>
          </div>

          </div>
          <div class="slider-ctrl">

            <div class="dots" id="dotWrapM"></div>

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function loadFolders()  { try { return JSON.parse(localStorage.getItem('place_folders')||'[]'); } catch(e){ return []; } }
  function saveFolders(f) { localStorage.setItem('place_folders', JSON.stringify(f)); }
  function loadSaved()    { try { return JSON.parse(localStorage.getItem('place_saved')||'[]'); } catch(e){ return []; } }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  const map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(37.55, 126.975),
    level: 7
  });
  const ps = new kakao.maps.services.Places();

  let markerOverlays  = [];
  let openInfoOverlay = null;
  let activeChipIdx   = 0;

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     4. 지역 칩 렌더링
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  const chipWrap = document.getElementById('regionChips');
  REGIONS.forEach((r, i) => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (i === 0 ? ' active' : '');
    btn.textContent = r.name;
    btn.addEventListener('click', () => {
      chipWrap.querySelector('.chip.active')?.classList.remove('active');
      btn.classList.add('active');
      activeChipIdx = i;
      if (r.nearby) {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(pos => {
            const loc = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
            map.setCenter(loc);
            map.setLevel(4);
          });
        }
      } else if (r.lat !== null) {
        map.setCenter(new kakao.maps.LatLng(r.lat, r.lng));
        map.setLevel(r.level);
      }
    });
    chipWrap.appendChild(btn);
  });

  function activateChip(idx) {
    const chips = chipWrap.querySelectorAll('.chip');
    if (chips[idx]) chips[idx].click();
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  let currentFolderId = null;

  function showView(name, title) {
    document.getElementById('viewHome').style.display   = name === 'home'   ? 'block' : 'none';
    document.getElementById('viewSearch').style.display = name === 'search' ? 'block' : 'none';
    document.getElementById('viewFolder').style.display = name === 'folder' ? 'block' : 'none';

    const nav = document.getElementById('viewNav');
    if (name === 'home') {
      nav.classList.remove('show');
      document.getElementById('homeBtn').classList.add('active');
      setStatus('큐레이션을 눌러보거나 검색해보세요.');
    } else {
      nav.classList.add('show');
      document.getElementById('homeBtn').classList.remove('active');
      document.getElementById('viewNavTitle').textContent = title || '';
    }
  }

  document.getElementById('homeBtn').addEventListener('click', goHome);
  document.getElementById('backBtn').addEventListener('click', goHome);
  function goHome() {
    clearMarkers();
    closeInfo();
    currentFolderId = null;
    renderFolderGrid();
    showView('home');

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function getEmoji(cat) {
    if (!cat) return '📍';
    if (cat.includes('카페'))                            return '☕';
    if (cat.includes('음식점')||cat.includes('식당'))    return '🍽️';
    if (cat.includes('편의점'))                          return '🏪';
    if (cat.includes('병원')||cat.includes('의원'))      return '🏥';
    if (cat.includes('약국'))                            return '💊';
    if (cat.includes('학교')||cat.includes('교육'))      return '🏫';
    if (cat.includes('주차'))                            return '🅿️';
    if (cat.includes('마트'))                            return '🛒';
    if (cat.includes('은행'))                            return '🏦';
    if (cat.includes('주유소'))                          return '⛽';
    if (cat.includes('숙박')||cat.includes('호텔'))      return '🏨';
    if (cat.includes('영화')||cat.includes('문화'))      return '🎬';
    if (cat.includes('스포츠')||cat.includes('헬스'))    return '💪';
    if (cat.includes('베이커리')||cat.includes('빵'))    return '🥐';
    if (cat.includes('술')||cat.includes('바'))          return '🍺';
    return '📍';
  }

  function setStatus(msg, type='') {
    const b = document.getElementById('statusBar');
    b.textContent = msg; b.className = 'status-bar ' + type;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     7. 마커 & 인포 팝업
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function clearMarkers() {
    markerOverlays.forEach(ov => ov.setMap(null));
    markerOverlays = [];
  }
  function closeInfo() {
    if (openInfoOverlay) { openInfoOverlay.setMap(null); openInfoOverlay = null; }
  }
  // placeId: 카카오 장소 ID (place.id 또는 저장된 kakao_id)
  function showInfo(place, pos, placeId) {
    closeInfo();
    const wrap = document.createElement('div');
    const bub  = document.createElement('div'); bub.className = 'info-bubble';

    // 닫기 버튼
    const xb = document.createElement('div'); xb.className = 'info-x'; xb.textContent = '✕';
    xb.addEventListener('click', e => { e.stopPropagation(); closeInfo(); });

    // 상호명
    const nm = document.createElement('div'); nm.className = 'info-name'; nm.textContent = place.place_name;

    // 주소
    const ad = document.createElement('div'); ad.className = 'info-addr';
    ad.textContent = place.road_address_name || place.address_name || '주소 정보 없음';

    bub.appendChild(xb); bub.appendChild(nm); bub.appendChild(ad);

    // 전화번호 (있을 때만)
    if (place.phone) {
      const ph = document.createElement('div'); ph.className = 'info-phone'; ph.textContent = '📞 ' + place.phone;
      bub.appendChild(ph);
    }

    // 카카오맵 링크 버튼
    // place.id(검색 결과) 또는 전달받은 placeId(저장 장소) 사용
    const kakaoId = placeId || place.id;
    if (kakaoId) {
      const kakaoUrl = `https://place.map.kakao.com/${kakaoId}`;

      // <a> 태그는 카카오맵 CustomOverlay 안에서 이벤트가 막혀 href가 동작하지 않음
      // → button + window.open() 방식으로 강제 새 탭 열기
      const kakaoBtn = document.createElement('button');
      kakaoBtn.className = 'info-kakao-btn';

      // 업로드된 핀 이미지 아이콘

  function isPlaceSaved(placeId) {
    return loadSaved().some(s => s.kakao_id === placeId);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     8. 검색
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function runSearch(keyword, forceLoc) {
    const kw = keyword || document.getElementById('searchInput').value.trim();
    if (!kw) { setStatus('검색어를 입력해주세요.', 'error'); document.getElementById('searchInput').focus(); return; }

    clearMarkers(); closeInfo();
    document.getElementById('viewSearch').innerHTML = '';
    showView('search', `"${kw}" 검색 결과`);
    setStatus('검색 중…', 'loading');

    const opts = { sort: kakao.maps.services.SortBy.DISTANCE };

    const executeSearch = () => ps.keywordSearch(kw, handleResult, opts);

    if (forceLoc) {
      opts.location = forceLoc;
      executeSearch();
    } else {
      const r = REGIONS[activeChipIdx];

      if (r?.nearby && navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          opts.location = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
          executeSearch();
        }, () => {
          setStatus('위치 정보를 가져올 수 없어요.', 'error');
        });
      } else if (activeChipIdx > 0) {
        opts.location = new kakao.maps.LatLng(r.lat, r.lng);
        executeSearch();
      } else {
        executeSearch();
      }
    }
  }

  function handleResult(data, status) {
    const sec = document.getElementById('viewSearch');
    if (status !== kakao.maps.services.Status.OK) {
      setStatus('결과를 찾지 못했어요.', 'error');
      sec.innerHTML = `<div class="folder-view-empty"><div class="e-ico">😕</div><p>검색 결과가 없어요.<br/>다른 키워드를 입력해보세요.</p></div>`;
      return;
    }

    setStatus(`${data.length}곳을 찾았어요 ✓`, 'success');
    const bounds = new kakao.maps.LatLngBounds();

    data.forEach((place, idx) => {
      const pos   = new kakao.maps.LatLng(place.y, place.x);
      const emoji = getEmoji(place.category_name);
      bounds.extend(pos);

      const mEl = document.createElement('div');
      mEl.className = 'emoji-marker'; mEl.textContent = emoji;
      mEl.addEventListener('click', e => {
        e.stopPropagation();
        map.panTo(pos); showInfo(place, pos); highlightCard(idx);
      });
      const mOv = new kakao.maps.CustomOverlay({ position:pos, content:mEl, yAnchor:1.1, zIndex:5 });
      mOv.setMap(map); markerOverlays.push(mOv);

      const card = document.createElement('div');
      card.className = 'result-card'; card.dataset.idx = idx;
      card.style.animationDelay = `${idx * 0.04}s`;

      const addr = place.road_address_name || place.address_name || '주소 없음';
      const cat  = place.category_name ? place.category_name.split(' > ').pop() : '분류 없음';
      const saved = isPlaceSaved(place.id);

      card.innerHTML = `
        <span class="card-num">#${idx+1}</span>
        <button class="save-btn ${saved?'saved':''}" data-pidx="${idx}" title="${saved?'저장됨':'저장하기'}">${saved?'🔖':'🔖'}</button>
        <div class="card-name">${emoji} ${place.place_name}</div>
        <div class="card-rows">
          <div class="card-row"><span class="ri">📌</span><span>${addr}</span></div>
          <div class="card-row"><span class="ri">📞</span><span>${place.phone||'전화번호 없음'}</span></div>
          <div class="card-row"><span class="ri">🏷️</span><span>${cat}</span></div>
        </div>`;

      card.addEventListener('click', e => {
        if (e.target.closest('.save-btn')) return;
        map.panTo(pos); showInfo(place, pos); highlightCard(idx);
      });

      card.querySelector('.save-btn').addEventListener('click', e => {
        e.stopPropagation();
        openSavePicker(place);
      });

      sec.appendChild(card);
    });

    map.setBounds(bounds);
  }

  function highlightCard(idx) {
    document.querySelectorAll('.result-card').forEach(c => c.classList.remove('active'));
    const t = document.querySelector(`.result-card[data-idx="${idx}"]`);
    if (t) { t.classList.add('active'); t.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
  }

  document.getElementById('searchBtn').addEventListener('click', () => runSearch());
  document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key==='Enter') runSearch(); });
  kakao.maps.event.addListener(map, 'click', () => {
    closeInfo();
    document.querySelectorAll('.result-card').forEach(c => c.classList.remove('active'));
  });

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     9. 폴더 관리
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function renderFolderGrid() {
    const grid = document.getElementById('folderGrid');
    grid.innerHTML = '';
    const folders = loadFolders();
    const saved   = loadSaved();

    if (folders.length === 0) {
      const hint = document.createElement('div');
      hint.style.gridColumn = '1 / -1';
      hint.innerHTML = `<div class="folder-empty"><div class="fe-ico">📂</div><p>아직 저장한 장소가 없어요.<br/>검색 후 🔖 버튼으로 저장해보세요.</p></div>`;
      grid.appendChild(hint);
    } else {
      folders.forEach(f => {
        const count = saved.filter(s => s.folderId === f.id).length;
        const card  = document.createElement('div');
        card.className = 'folder-card';
        card.style.background = f.color;

        const delBtn = document.createElement('div');
        delBtn.className = 'folder-del'; delBtn.textContent = '✕';
        delBtn.addEventListener('click', e => {
          e.stopPropagation();
          if (confirm(`'${f.name}' 폴더를 삭제할까요?\n(저장된 장소도 함께 삭제됩니다)`)) {
            let fls = loadFolders().filter(x => x.id !== f.id);
            let svd = loadSaved().filter(x => x.folderId !== f.id);
            saveFolders(fls); saveSaved(svd);
            renderFolderGrid();
          }
        });

        card.innerHTML = `
          <div class="folder-ico">${f.icon}</div>
          <div class="folder-name">${f.name}</div>
          <div class="folder-count">${count}곳</div>`;
        card.appendChild(delBtn);
        card.addEventListener('click', () => openFolderView(f.id));
        grid.appendChild(card);
      });
    }

    const addCard = document.createElement('div');
    addCard.className = 'add-folder-card';
    addCard.innerHTML = `<div class="add-ico">+</div><div class="add-lbl">새 폴더</div>`;
    addCard.addEventListener('click', openCreateFolder);
    grid.appendChild(addCard);
  }

  function openFolderView(folderId) {
    currentFolderId = folderId;
    const folder  = loadFolders().find(f => f.id === folderId);
    const places  = loadSaved().filter(s => s.folderId === folderId);
    const sec     = document.getElementById('viewFolder');
    sec.innerHTML = '';

    clearMarkers(); closeInfo();

    if (!folder) return;
    showView('folder', `${folder.icon} ${folder.name}`);

    if (places.length === 0) {
      sec.innerHTML = `<div class="folder-view-empty"><div class="e-ico">${folder.icon}</div><p>아직 저장된 장소가 없어요.<br/>검색 후 🔖 버튼으로 저장해보세요.</p></div>`;
      return;
    }

    setStatus(`${places.length}곳이 저장돼 있어요`, 'success');
    const bounds = new kakao.maps.LatLngBounds();

    places.forEach((sp, idx) => {
      const pos   = new kakao.maps.LatLng(sp.lat, sp.lng);
      const emoji = getEmoji(sp.category_name);
      bounds.extend(pos);

      const mEl = document.createElement('div');
      mEl.className = 'emoji-marker'; mEl.textContent = emoji;
      mEl.addEventListener('click', e => {
        e.stopPropagation();
        map.panTo(pos);
        // 저장된 카카오 장소 ID(kakao_id)를 세 번째 인자로 전달
        showInfo({ place_name:sp.place_name, road_address_name:sp.road_address_name, address_name:sp.address_name, phone:sp.phone }, pos, sp.kakao_id);
      });
      const mOv = new kakao.maps.CustomOverlay({ position:pos, content:mEl, yAnchor:1.1, zIndex:5 });
      mOv.setMap(map); markerOverlays.push(mOv);

      const card = document.createElement('div');
      card.className = 'saved-place-card';
      card.style.animationDelay = `${idx * 0.04}s`;

      const delBtn = document.createElement('button');
      delBtn.className = 'sp-del'; delBtn.textContent = '🗑️';
      delBtn.title = '저장 삭제';
      delBtn.addEventListener('click', e => {
        e.stopPropagation();
        let svd = loadSaved().filter(s => s.id !== sp.id);
        saveSaved(svd);
        openFolderView(folderId);
      });

      card.innerHTML = `
        <div class="sp-name">${emoji} ${sp.place_name}</div>
        <div class="sp-addr">📌 ${sp.road_address_name || sp.address_name || '주소 없음'}</div>
        <div class="sp-cat">🏷️ ${sp.category_name ? sp.category_name.split(' > ').pop() : '분류 없음'}</div>`;
      card.appendChild(delBtn);
      card.addEventListener('click', e => {
        if (e.target.closest('.sp-del')) return;
        map.panTo(pos);
        // 저장된 카카오 장소 ID(kakao_id)를 세 번째 인자로 전달
        showInfo({ place_name:sp.place_name, road_address_name:sp.road_address_name, address_name:sp.address_name, phone:sp.phone }, pos, sp.kakao_id);
      });
      sec.appendChild(card);
    });

    map.setBounds(bounds);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     10. 저장 피커 모달
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  let pendingPlace = null;

  function openSavePicker(place) {
    pendingPlace = place;
    document.getElementById('pickerPlaceName').textContent = '📍 ' + place.place_name;
    renderPickerFolders();
    openModal('savePickerModal');
  }

  function renderPickerFolders() {
    const wrap    = document.getElementById('pickerFolders');
    const folders = loadFolders();
    const saved   = loadSaved();
    wrap.innerHTML = '';

    if (folders.length === 0) {
      wrap.innerHTML = `<p style="font-size:.75rem;color:var(--t3);text-align:center;padding:10px 0">아직 폴더가 없어요.</p>`;
      return;
    }

    folders.forEach(f => {
      const count = saved.filter(s => s.folderId === f.id).length;
      const row   = document.createElement('div');
      row.className = 'picker-folder-row';
      row.innerHTML = `
        <div class="pf-dot" style="background:${f.color}">${f.icon}</div>
        <span class="pf-name">${f.name}</span>
        <span class="pf-count">${count}곳</span>`;
      row.addEventListener('click', () => {
        saveToFolder(f.id);
        closeModal('savePickerModal');
      });
      wrap.appendChild(row);
    });
  }

  function saveToFolder(folderId) {
    if (!pendingPlace) return;
    const p = pendingPlace;
    let saved = loadSaved();

    if (saved.some(s => s.kakao_id === p.id && s.folderId === folderId)) {
      alert('이미 이 폴더에 저장된 장소예요!'); return;
    }

    saved.push({
      id:            Date.now(),
      folderId:      folderId,
      kakao_id:      p.id,
      place_name:    p.place_name,
      road_address_name: p.road_address_name || '',
      address_name:  p.address_name || '',
      phone:         p.phone || '',
      category_name: p.category_name || '',
      lat:           parseFloat(p.y),
      lng:           parseFloat(p.x),
      savedAt:       Date.now()
    });
    saveSaved(saved);

    pendingPlace = null;
    alert(`✅ '${loadFolders().find(f=>f.id===folderId)?.name}' 폴더에 저장됐어요!`);
  }

  document.getElementById('pickerNewBtn').addEventListener('click', () => {
    closeModal('savePickerModal');
    openCreateFolder(true);
  });
  document.getElementById('pickerCancelBtn').addEventListener('click', () => {
    pendingPlace = null;
    closeModal('savePickerModal');
  });

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     11. 폴더 생성 모달
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  let cfSelectedIcon  = FOLDER_ICONS[0];
  let cfSelectedColor = FOLDER_COLORS[0];
  let afterCreateOpenPicker = false;

  function buildCreateFolderUI() {
    const ig = document.getElementById('cfIconGrid');
    ig.innerHTML = '';
    FOLDER_ICONS.forEach(ico => {
      const el = document.createElement('button');
      el.className = 'ico-opt' + (ico === cfSelectedIcon ? ' sel' : '');
      el.textContent = ico;
      el.addEventListener('click', () => {
        ig.querySelectorAll('.ico-opt').forEach(e => e.classList.remove('sel'));
        el.classList.add('sel');
        cfSelectedIcon = ico;
      });
      ig.appendChild(el);
    });

    const cs = document.getElementById('cfColorSwatches');
    cs.innerHTML = '';
    FOLDER_COLORS.forEach(color => {
      const el = document.createElement('div');
      el.className = 'swatch' + (color === cfSelectedColor ? ' sel' : '');
      el.style.background = color;
      el.addEventListener('click', () => {
        cs.querySelectorAll('.swatch').forEach(e => e.classList.remove('sel'));
        el.classList.add('sel');
        cfSelectedColor = color;
      });
      cs.appendChild(el);
    });
  }

  function openCreateFolder(reopenPicker = false) {
    afterCreateOpenPicker = !!reopenPicker;
    cfSelectedIcon  = FOLDER_ICONS[0];
    cfSelectedColor = FOLDER_COLORS[0];
    document.getElementById('cfNameInput').value = '';
    buildCreateFolderUI();
    openModal('createFolderModal');
  }

  document.getElementById('cfCreateBtn').addEventListener('click', () => {
    const name = document.getElementById('cfNameInput').value.trim();
    if (!name) { document.getElementById('cfNameInput').focus(); return; }

    let folders = loadFolders();
    folders.push({ id: Date.now(), name, icon: cfSelectedIcon, color: cfSelectedColor });
    saveFolders(folders);
    closeModal('createFolderModal');
    renderFolderGrid();

    if (afterCreateOpenPicker && pendingPlace) {
      setTimeout(() => { renderPickerFolders(); openModal('savePickerModal'); }, 200);
    }
  });
  document.getElementById('cfCancelBtn').addEventListener('click', () => {
    if (afterCreateOpenPicker && pendingPlace) {
      closeModal('createFolderModal');
      setTimeout(() => { renderPickerFolders(); openModal('savePickerModal'); }, 200);
    } else {
      closeModal('createFolderModal');
    }
  });

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     12. 모달 열기/닫기
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function openModal(id)  { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  ['curateModal','savePickerModal','createFolderModal'].forEach(id => {
    document.getElementById(id).addEventListener('click', e => {
      if (e.target.id === id) closeModal(id);
    });
  });
  window.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      ['curateModal','savePickerModal','createFolderModal'].forEach(closeModal);
    }
  });

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     13. 큐레이션 캐러셀
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  const track    = document.getElementById('sliderTrack');
  const dotWrap  = document.getElementById('dotWrap');
  const progBar  = document.getElementById('progBar');
  let curIdx     = 0;
  let autoTimer  = null;
  const AUTO_SEC = 10;

  CURATION.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'curate-card';
    const bg  = document.createElement('div'); bg.className = 'card-bg'; bg.style.background = c.gradient;
    const ov  = document.createElement('div'); ov.className = 'card-ov';
    const cnt = document.createElement('div'); cnt.className = 'card-cnt';
    cnt.innerHTML = `
      <span class="card-tag" style="">${c.tag}</span>
      <div class="card-pname">${c.name}</div>
      <div class="card-region">📍 ${c.region}</div>
      <div class="card-desc-p">${c.desc}</div>`;
    card.appendChild(bg); card.appendChild(ov); card.appendChild(cnt);
    card.addEventListener('click', () => openCurateModal(i));
    card.addEventListener('mousedown', e => e.preventDefault());
    track.appendChild(card);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => { slideTo(i); startAuto(); });
    dotWrap.appendChild(dot);
  });

  function slideTo(n) {
    curIdx = (n + CURATION.length) % CURATION.length;
    track.style.transform = `translateX(-${curIdx * 100}%)`;
    dotWrap.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===curIdx));
    restartProg();
  }

  function restartProg() {
    progBar.style.transition = 'none';
    progBar.style.width = '0%';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      progBar.style.transition = `width ${AUTO_SEC}s linear`;
      progBar.style.width = '100%';
    }));
  }

  function startAuto() {
    clearInterval(autoTimer);
    autoTimer = setInterval(() => slideTo(curIdx + 1), AUTO_SEC * 1000);
    restartProg();
  }

  document.getElementById('btnPrev').addEventListener('click', () => { slideTo(curIdx - 1); startAuto(); });
  document.getElementById('btnNext').addEventListener('click', () => { slideTo(curIdx + 1); startAuto(); });

  let dragX = 0, dragging = false;
  const sOuter = document.getElementById('sliderOuter');
  sOuter.addEventListener('mousedown', e => { dragging = true; dragX = e.clientX; });
  window.addEventListener('mouseup', e => {
    if (!dragging) return; dragging = false;
    const d = dragX - e.clientX;
    if (Math.abs(d) > 35) { slideTo(d > 0 ? curIdx+1 : curIdx-1); startAuto(); }
  });

  let tX = 0;
  sOuter.addEventListener('touchstart', e => { tX = e.touches[0].clientX; }, { passive:true });
  sOuter.addEventListener('touchend', e => {
    const d = tX - e.changedTouches[0].clientX;
    if (Math.abs(d) > 35) { slideTo(d > 0 ? curIdx+1 : curIdx-1); startAuto(); }
  });

  startAuto();

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     14. 큐레이션 모달
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  let activeCuration = null;

  function openCurateModal(idx) {
    activeCuration = CURATION[idx];
    const c = activeCuration;

    document.getElementById('mHeroBg').style.background = c.gradient;
    document.getElementById('mEmoji').textContent        = c.emoji;
    const tagEl = document.getElementById('mTag');
    tagEl.textContent = c.tag;
    document.getElementById('mPname').textContent   = c.name;
    document.getElementById('mPregion').textContent = '📍 ' + c.region;
    document.getElementById('mDesc').textContent    = c.desc;

    const info = document.getElementById('mInfo');
    info.innerHTML = '';
    c.tips.forEach(t => {
      const row = document.createElement('div'); row.className = 'm-info-row';
      row.innerHTML = `<span class="m-ico">${t.ico}</span><span class="m-label">${t.label}</span><span class="m-val">${t.val}</span>`;
      info.appendChild(row);
    });

    openModal('curateModal');
    clearInterval(autoTimer);
    progBar.style.transition = 'none';
    progBar.style.width = '0%';
  }

  document.getElementById('mCloseBtn').addEventListener('click', () => {
    closeModal('curateModal');
    activeCuration = null;
    startAuto();
  });

  document.getElementById('mSearchBtn').addEventListener('click', () => {
    if (!activeCuration) return;
    const c = activeCuration;
    closeModal('curateModal');

    activateChip(c.regionIdx);
    document.getElementById('searchInput').value = c.keyword;

    const region   = REGIONS[c.regionIdx];
    const forceLoc = new kakao.maps.LatLng(region.lat, region.lng);
    runSearch(c.keyword, forceLoc);

    activeCuration = null;
  });

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     15. 초기 렌더링
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  renderFolderGrid();
  showView('home');

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     16. 모바일 전용 로직
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  const isMobile = () => window.innerWidth <= 700;

  /* ── 모바일 캐러셀 (복제본) ── */
  const trackM   = document.getElementById('sliderTrackM');
  const dotWrapM = document.getElementById('dotWrapM');
  const progBarM = document.getElementById('progBarM');
  let curIdxM    = 0;
  let autoTimerM = null;

  CURATION.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'curate-card';
    const bg  = document.createElement('div'); bg.className = 'card-bg'; bg.style.background = c.gradient;
    const ov  = document.createElement('div'); ov.className = 'card-ov';
    const cnt = document.createElement('div'); cnt.className = 'card-cnt';
    cnt.innerHTML = `
      <span class="card-tag">${c.tag}</span>
      <div class="card-pname">${c.name}</div>
      <div class="card-region">📍 ${c.region}</div>
      <div class="card-desc-p">${c.desc}</div>`;
    card.appendChild(bg); card.appendChild(ov); card.appendChild(cnt);
    card.addEventListener('click', () => openCurateModal(i));
    card.addEventListener('mousedown', e => e.preventDefault());
    trackM.appendChild(card);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => { slideToM(i); startAutoM(); });
    dotWrapM.appendChild(dot);
  });

  function slideToM(n) {
    curIdxM = (n + CURATION.length) % CURATION.length;
    trackM.style.transform = `translateX(-${curIdxM * 100}%)`;
    dotWrapM.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===curIdxM));
    restartProgM();
  }
  function restartProgM() {
    progBarM.style.transition = 'none'; progBarM.style.width = '0%';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      progBarM.style.transition = `width ${AUTO_SEC}s linear`; progBarM.style.width = '100%';
    }));
  }
  function startAutoM() {
    clearInterval(autoTimerM);
    autoTimerM = setInterval(() => slideToM(curIdxM + 1), AUTO_SEC * 1000);
    restartProgM();
  }

  document.getElementById('btnPrevM').addEventListener('click', () => { slideToM(curIdxM-1); startAutoM(); });
  document.getElementById('btnNextM').addEventListener('click', () => { slideToM(curIdxM+1); startAutoM(); });

  let dragXM = 0, draggingM = false;
  const sOuterM = document.getElementById('sliderOuterM');
  sOuterM.addEventListener('mousedown', e => { draggingM = true; dragXM = e.clientX; });
  window.addEventListener('mouseup', e => {
    if (!draggingM) return; draggingM = false;
    const d = dragXM - e.clientX;
    if (Math.abs(d) > 35) { slideToM(d > 0 ? curIdxM+1 : curIdxM-1); startAutoM(); }
  });
  let tXM = 0;
  sOuterM.addEventListener('touchstart', e => { tXM = e.touches[0].clientX; }, { passive:true });
  sOuterM.addEventListener('touchend', e => {
    const d = tXM - e.changedTouches[0].clientX;
    if (Math.abs(d) > 35) { slideToM(d > 0 ? curIdxM+1 : curIdxM-1); startAutoM(); }
  });
  if (isMobile()) startAutoM();

  /* ── 모바일 폴더 그리드 ── */
  function renderFolderGridM() {
    const grid = document.getElementById('folderGridM');
    if (!grid) return;
    const folders = loadFolders();
    const saved   = loadSaved();
    grid.innerHTML = '';
    if (!folders.length) {
      const empty = document.createElement('div');
      empty.className = 'folder-empty';
      empty.innerHTML = `<div class="fe-ico">📂</div><p>아직 폴더가 없어요.<br/>장소를 저장해 나만의 목록을 만들어보세요.</p>`;
      grid.appendChild(empty);
    } else {
      folders.forEach(f => {
        const cnt = saved.filter(s => s.folderId === f.id).length;
        const card = document.createElement('div');
        card.className = 'folder-card';
        card.style.background = f.color;
        card.innerHTML = `
          <div class="folder-del" data-fid="${f.id}">✕</div>
          <div class="folder-ico">${f.icon}</div>
          <div class="folder-name">${f.name}</div>
          <div class="folder-count">${cnt}곳</div>`;
        card.querySelector('.folder-del').addEventListener('click', e => {
          e.stopPropagation();
          if (!confirm(`'${f.name}' 폴더를 삭제할까요?`)) return;
          let fl = loadFolders().filter(x => x.id !== f.id);
          saveFolders(fl);
          let sl = loadSaved().filter(x => x.folderId !== f.id);
          saveSaved(sl);
          renderFolderGrid(); renderFolderGridM();
        });
        card.addEventListener('click', () => {
          currentFolderId = f.id;
          showFolderView(f);
        });
        grid.appendChild(card);
      });
    }
    const addCard = document.createElement('div');
    addCard.className = 'add-folder-card';
    addCard.innerHTML = `<div class="add-ico">＋</div><div class="add-lbl">새 폴더</div>`;
    addCard.addEventListener('click', () => openCreateFolder(false));
    grid.appendChild(addCard);
  }

  /* ── 모바일 결과 시트 열기/닫기 ── */
  function openMobileResultSheet(title) {
    const sheet = document.getElementById('mobileResultSheet');
    document.getElementById('sheetTitle').textContent = title || '검색 결과';
    document.getElementById('sheetScroll').innerHTML = '';
    document.getElementById('statusBarSheet').textContent = '';
    sheet.classList.add('active');
    document.getElementById('map').classList.add('visible');
    document.getElementById('sidebar') && null;
    document.querySelector('.sidebar').classList.add('results-open');
    // 패널 높이 CSS 변수 업데이트
    const panelH = document.getElementById('searchPanel').offsetHeight;
    document.querySelector('.sidebar').style.setProperty('--panel-h', panelH + 'px');
  }

  function closeMobileResultSheet() {
    document.getElementById('mobileResultSheet').classList.remove('active');
    document.getElementById('map').classList.remove('visible');
    document.querySelector('.sidebar').classList.remove('results-open');
  }

  document.getElementById('sheetCloseBtn').addEventListener('click', () => {
    closeMobileResultSheet();
    clearMarkers(); closeInfo();
    renderFolderGridM();
  });

  document.getElementById('sheetHandleBar').addEventListener('click', () => {
    // 핸들 탭하면 시트 높이 토글
    const sheet = document.getElementById('mobileResultSheet');
    sheet.style.height = sheet.style.height === '85vh' ? '45vh' : '85vh';
  });

  /* ── 모바일: showView 후처리 ── */
  const _origShowView = showView;
  // 모바일 전용 결과 렌더링 후처리는 runSearch 패치로 처리

  /* ── 모바일: runSearch 래핑 ── */
  const _origHandleResult = handleResult;

  // 검색 결과를 모바일 시트에도 미러링
  function mirrorResultsToSheet(data, status) {
    if (!isMobile()) return;
    const sheet  = document.getElementById('mobileResultSheet');
    const scroll = document.getElementById('sheetScroll');
    const statEl = document.getElementById('statusBarSheet');

    if (status !== kakao.maps.services.Status.OK) {
      statEl.textContent = '결과를 찾지 못했어요.';
      statEl.className = 'status-bar error';
      scroll.innerHTML = `<div class="folder-view-empty"><div class="e-ico">😕</div><p>검색 결과가 없어요.<br/>다른 키워드를 입력해보세요.</p></div>`;
      return;
    }

    statEl.textContent = `${data.length}곳을 찾았어요 ✓`;
    statEl.className = 'status-bar success';

    data.forEach((place, idx) => {
      const pos   = new kakao.maps.LatLng(place.y, place.x);
      const emoji = getEmoji(place.category_name);
      const addr  = place.road_address_name || place.address_name || '주소 없음';
      const cat   = place.category_name ? place.category_name.split(' > ').pop() : '분류 없음';
      const saved = isPlaceSaved(place.id);

      const card = document.createElement('div');
      card.className = 'result-card'; card.dataset.midx = idx;
      card.style.animationDelay = `${idx * 0.04}s`;
      card.innerHTML = `
        <span class="card-num">#${idx+1}</span>
        <button class="save-btn ${saved?'saved':''}" data-pidx="${idx}" title="${saved?'저장됨':'저장하기'}">🔖</button>
        <div class="card-name">${emoji} ${place.place_name}</div>
        <div class="card-rows">
          <div class="card-row"><span class="ri">📌</span><span>${addr}</span></div>
          <div class="card-row"><span class="ri">📞</span><span>${place.phone||'전화번호 없음'}</span></div>
          <div class="card-row"><span class="ri">🏷️</span><span>${cat}</span></div>
        </div>`;
      card.addEventListener('click', e => {
        if (e.target.closest('.save-btn')) return;
        map.panTo(pos); showInfo(place, pos);
        scroll.querySelectorAll('.result-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
      });
      card.querySelector('.save-btn').addEventListener('click', e => {
        e.stopPropagation(); openSavePicker(place);
      });
      scroll.appendChild(card);
    });
  }

  /* ── 원래 runSearch 래핑 ── */
  // handleResult 원본에 모바일 미러 연결
  const __origHandleResult = handleResult;

  // handleResult를 재정의해서 모바일 시트에도 반영
  // (전역 스코프에 있으므로 shadow 처리)
  const _patchedHandleResult = function(data, status) {
    __origHandleResult(data, status);
    if (isMobile()) {
      const kw = document.getElementById('searchInput').value.trim();
      openMobileResultSheet(`"${kw}" 검색 결과`);
      mirrorResultsToSheet(data, status);
    }
  };

  // ps.keywordSearch 콜백을 패치하기 위해 runSearch를 오버라이드
  function runSearch(keyword, forceLoc) {
    const kw = keyword || document.getElementById('searchInput').value.trim();
    if (!kw) {
      setStatus('검색어를 입력해주세요.', 'error');
      document.getElementById('searchInput').focus();
      return;
    }

    clearMarkers(); closeInfo();
    document.getElementById('viewSearch').innerHTML = '';
    showView('search', `"${kw}" 검색 결과`);
    setStatus('검색 중…', 'loading');

    const opts = { sort: kakao.maps.services.SortBy.DISTANCE };

    const executeSearch = () => ps.keywordSearch(kw, _patchedHandleResult, opts);

    if (forceLoc) {
      opts.location = forceLoc;
      executeSearch();
    } else {
      const r = REGIONS[activeChipIdx];
      if (r?.nearby && navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          opts.location = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
          executeSearch();
        }, () => { setStatus('위치 정보를 가져올 수 없어요.', 'error'); });
      } else if (activeChipIdx > 0) {
        opts.location = new kakao.maps.LatLng(r.lat, r.lng);
        executeSearch();
      } else {
        executeSearch();
      }
    }
  }

  /* ── 모바일 goHome ── */
  const _origGoHome = goHome;
  function goHome() {
    clearMarkers(); closeInfo();
    currentFolderId = null;
    renderFolderGrid();
    renderFolderGridM();
    showView('home');
    if (isMobile()) {
      closeMobileResultSheet();
      document.getElementById('searchInput').value = '';
    }
  }

  document.getElementById('homeBtn').removeEventListener && null;
  /* homeBtn / backBtn 은 기존 addEventListener('click', goHome) 이 이미 걸려 있으므로
     goHome 함수를 재정의하면 자동으로 새 버전이 호출됨 */
  // searchBtn / searchInput keydown: 중복 등록이지만 동일 로직이므로 무시
  

  /* ── 모바일 초기화 ── */
  function initMobile() {
    if (!isMobile()) return;
    renderFolderGridM();
    // 지도는 결과 전까지 숨김
    document.getElementById('map').classList.remove('visible');
  }
  initMobile();
  window.addEventListener('resize', initMobile);
  </script>
</body>
</html>
