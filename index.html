<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📍 장소 탐색기</title>

  <!-- 카카오맵 SDK: services 라이브러리 포함 -->
  <script type="text/javascript"
    src="//dapi.kakao.com/v2/maps/sdk.js?appkey=6ac811cfe03fac96b5d6699028337d78&libraries=services">
  </script>

  <style>
    /* ── 구글 폰트 ── */
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

    /* ── CSS 변수 (색상·크기 토큰) ── */
    :root {
      --bg:        #0e1117;
      --panel:     #161b25;
      --surface:   #1e2535;
      --border:    #2a3347;
      --accent:    #4f8ef7;
      --accent2:   #7c5df9;
      --text:      #e8ecf4;
      --muted:     #7a8499;
      --hover:     #242d42;
      --radius:    12px;
      --shadow:    0 4px 24px rgba(0,0,0,.45);
    }

    /* ── 리셋 & 기본 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── 상단 헤더 ── */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 24px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,.4);
      z-index: 10;
    }
    header .logo {
      font-family: 'Space Mono', monospace;
      font-size: 1.1rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    header .subtitle {
      font-size: .75rem;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── 2분할 레이아웃 ── */
    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: 360px 1fr;
      overflow: hidden;
    }

    /* ── 왼쪽 패널 ── */
    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 검색창 영역 */
    .search-box {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
    }
    .search-box label {
      display: block;
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .input-row {
      display: flex;
      gap: 8px;
    }
    .input-row input {
      flex: 1;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: .9rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }
    .input-row input::placeholder { color: var(--muted); }
    .input-row input:focus { border-color: var(--accent); }
    .input-row button {
      padding: 10px 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s, transform .1s;
    }
    .input-row button:hover  { opacity: .88; }
    .input-row button:active { transform: scale(.97); }

    /* 상태 메시지 */
    .status-bar {
      padding: 8px 16px;
      font-size: .78rem;
      color: var(--muted);
      min-height: 30px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-bar.loading { color: var(--accent); }
    .status-bar.error   { color: #f87171; }
    .status-bar.success { color: #34d399; }

    /* 결과 리스트 */
    .result-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 10px 12px;
    }
    .result-list::-webkit-scrollbar { width: 5px; }
    .result-list::-webkit-scrollbar-track { background: transparent; }
    .result-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* 결과 없을 때 안내 */
    .empty-hint {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      opacity: .45;
    }
    .empty-hint .icon { font-size: 2.8rem; }
    .empty-hint p { font-size: .85rem; color: var(--muted); text-align: center; line-height: 1.6; }

    /* 개별 결과 카드 */
    .result-card {
      padding: 12px 14px;
      margin-bottom: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .1s;
      position: relative;
      animation: slideIn .25s ease both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .result-card:hover {
      background: var(--hover);
      border-color: var(--accent);
      transform: translateX(3px);
    }
    .result-card.active {
      border-color: var(--accent2);
      background: rgba(124,93,249,.12);
    }
    .card-index {
      position: absolute;
      top: 10px; right: 12px;
      font-family: 'Space Mono', monospace;
      font-size: .68rem;
      color: var(--muted);
    }
    .card-name {
      font-size: .92rem;
      font-weight: 700;
      margin-bottom: 5px;
      padding-right: 28px;
    }
    .card-meta {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .card-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      font-size: .76rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .card-row .icon { flex-shrink: 0; font-size: .8rem; margin-top: 1px; }

    /* ── 오른쪽: 지도 ── */
    #map {
      width: 100%;
      height: 100%;
    }

    /* ── 커스텀 오버레이 (이모지 마커) ── */
    .custom-marker {
      font-size: 1.8rem;
      cursor: pointer;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,.5));
      transition: transform .15s;
      user-select: none;
    }
    .custom-marker:hover { transform: scale(1.25); }

    /* ── 인포윈도우 스타일 ── */
    .info-wrap {
      background: var(--panel);
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 200px;
      max-width: 260px;
      box-shadow: var(--shadow);
      position: relative;
    }
    .info-wrap .info-name {
      font-weight: 700;
      font-size: .92rem;
      color: var(--text);
      margin-bottom: 5px;
    }
    .info-wrap .info-addr {
      font-size: .78rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .info-wrap .info-close {
      position: absolute;
      top: 7px; right: 9px;
      cursor: pointer;
      font-size: .85rem;
      color: var(--muted);
      line-height: 1;
    }
    .info-wrap .info-close:hover { color: var(--text); }
    /* 말풍선 꼬리 */
    .info-tail {
      width: 0; height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 9px solid var(--accent);
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <header>
    <div>
      <div class="logo">📍 장소 탐색기</div>
      <div class="subtitle">Kakao Maps · Keyword Search</div>
    </div>
  </header>

  <!-- 2분할 레이아웃 -->
  <div class="layout">

    <!-- 왼쪽: 검색 + 결과 리스트 -->
    <aside class="sidebar">

      <div class="search-box">
        <label>🔍 키워드로 장소 검색</label>
        <div class="input-row">
          <input
            id="searchInput"
            type="text"
            placeholder="예) 카페, 병원, 편의점…"
            autocomplete="off"
          />
          <button id="searchBtn">검색</button>
        </div>
      </div>

      <!-- 상태 메시지 표시줄 -->
      <div class="status-bar" id="statusBar">
        검색어를 입력하고 버튼을 눌러보세요.
      </div>

      <!-- 결과 목록 -->
      <div class="result-list" id="resultList">
        <div class="empty-hint">
          <div class="icon">🗺️</div>
          <p>검색 결과가 여기에 나타납니다.<br/>학교 주변을 탐색해보세요!</p>
        </div>
      </div>

    </aside>

    <!-- 오른쪽: 카카오맵 -->
    <div id="map"></div>

  </div>

  <script>
    /* ────────────────────────────────
       1. 지도 초기화
    ──────────────────────────────── */
    const SCHOOL_LAT = 37.66;   // 학교 위도
    const SCHOOL_LNG = 126.83;  // 학교 경도
    const DEFAULT_LEVEL = 5;    // 초기 확대 레벨

    const mapContainer = document.getElementById('map');
    const mapOption = {
      center: new kakao.maps.LatLng(SCHOOL_LAT, SCHOOL_LNG),
      level: DEFAULT_LEVEL
    };
    const map = new kakao.maps.Map(mapContainer, mapOption);

    // 장소 검색 서비스 객체 생성
    const ps = new kakao.maps.services.Places();

    // 현재 열려 있는 커스텀 오버레이(인포윈도우) 저장용
    let openOverlay = null;

    // 마커 오버레이 & 인포 오버레이 배열
    let markerOverlays = [];

    /* ────────────────────────────────
       2. UI 요소 참조
    ──────────────────────────────── */
    const searchInput = document.getElementById('searchInput');
    const searchBtn   = document.getElementById('searchBtn');
    const resultList  = document.getElementById('resultList');
    const statusBar   = document.getElementById('statusBar');

    /* ────────────────────────────────
       3. 상태 메시지 변경 함수
    ──────────────────────────────── */
    function setStatus(msg, type = '') {
      statusBar.textContent = msg;
      statusBar.className = 'status-bar ' + type;
    }

    /* ────────────────────────────────
       4. 기존 마커 & 리스트 초기화
    ──────────────────────────────── */
    function clearAll() {
      // 지도 위 마커 오버레이 제거
      markerOverlays.forEach(ov => ov.setMap(null));
      markerOverlays = [];

      // 열려있는 인포 오버레이 제거
      if (openOverlay) {
        openOverlay.setMap(null);
        openOverlay = null;
      }

      // 결과 리스트 비우기
      resultList.innerHTML = '';
    }

    /* ────────────────────────────────
       5. 카테고리별 이모지 선택 함수
    ──────────────────────────────── */
    function getEmoji(category) {
      if (!category) return '📍';
      if (category.includes('카페'))          return '☕';
      if (category.includes('음식점') || category.includes('식당') || category.includes('맛집')) return '🍽️';
      if (category.includes('편의점'))         return '🏪';
      if (category.includes('병원') || category.includes('의원')) return '🏥';
      if (category.includes('약국'))           return '💊';
      if (category.includes('학교') || category.includes('교육')) return '🏫';
      if (category.includes('주차'))           return '🅿️';
      if (category.includes('마트') || category.includes('대형마트')) return '🛒';
      if (category.includes('은행'))           return '🏦';
      if (category.includes('주유소'))         return '⛽';
      if (category.includes('숙박') || category.includes('호텔')) return '🏨';
      if (category.includes('문화') || category.includes('영화')) return '🎬';
      if (category.includes('스포츠') || category.includes('헬스')) return '💪';
      return '📍';
    }

    /* ────────────────────────────────
       6. 인포 오버레이 표시 함수
    ──────────────────────────────── */
    function showInfoOverlay(place, position) {
      // 기존 인포 오버레이 닫기
      if (openOverlay) openOverlay.setMap(null);

      const content = `
        <div class="info-wrap">
          <span class="info-close" id="infoClose">✕</span>
          <div class="info-name">${place.place_name}</div>
          <div class="info-addr">${place.road_address_name || place.address_name || '주소 정보 없음'}</div>
        </div>
        <div class="info-tail"></div>
      `;

      openOverlay = new kakao.maps.CustomOverlay({
        position: position,
        content: content,
        yAnchor: 1.5,   // 마커 위에 뜨도록
        zIndex: 10
      });
      openOverlay.setMap(map);

      // 닫기 버튼 이벤트: DOM에 렌더 후 등록
      setTimeout(() => {
        const closeBtn = document.getElementById('infoClose');
        if (closeBtn) {
          closeBtn.addEventListener('click', () => {
            openOverlay.setMap(null);
            openOverlay = null;
          });
        }
      }, 0);
    }

    /* ────────────────────────────────
       7. 검색 결과 처리 콜백
    ──────────────────────────────── */
    function handleSearchResult(data, status) {
      if (status !== kakao.maps.services.Status.OK) {
        // 검색 실패 또는 결과 없음
        setStatus('검색 결과가 없습니다. 다른 키워드를 입력해보세요.', 'error');
        resultList.innerHTML = `
          <div class="empty-hint">
            <div class="icon">🔍</div>
            <p>결과를 찾지 못했어요.<br/>키워드를 바꿔 다시 검색해 보세요!</p>
          </div>
        `;
        return;
      }

      setStatus(`${data.length}개의 장소를 찾았어요 ✨`, 'success');

      // 지도 범위 자동 조절용 객체
      const bounds = new kakao.maps.LatLngBounds();

      data.forEach((place, idx) => {
        const position = new kakao.maps.LatLng(place.y, place.x);
        bounds.extend(position);

        const emoji = getEmoji(place.category_name);

        /* 7-1. 이모지 마커 (커스텀 오버레이) 생성 */
        const markerContent = `<div class="custom-marker" data-idx="${idx}">${emoji}</div>`;
        const markerOverlay = new kakao.maps.CustomOverlay({
          position: position,
          content: markerContent,
          yAnchor: 1,
          zIndex: 5
        });
        markerOverlay.setMap(map);
        markerOverlays.push(markerOverlay);

        // 마커 클릭 → 인포 오버레이 표시 (DOM 렌더 후 이벤트 등록)
        setTimeout(() => {
          const el = document.querySelector(`.custom-marker[data-idx="${idx}"]`);
          if (el) {
            el.addEventListener('click', () => {
              showInfoOverlay(place, position);
              highlightCard(idx);
            });
          }
        }, 0);

        /* 7-2. 왼쪽 결과 카드 생성 */
        const card = document.createElement('div');
        card.className = 'result-card';
        card.dataset.idx = idx;
        card.style.animationDelay = `${idx * 0.05}s`;

        const phone      = place.phone            || '전화번호 없음';
        const roadAddr   = place.road_address_name || place.address_name || '주소 없음';
        const category   = place.category_name     || '분류 없음';

        card.innerHTML = `
          <span class="card-index">#${idx + 1}</span>
          <div class="card-name">${emoji} ${place.place_name}</div>
          <div class="card-meta">
            <div class="card-row"><span class="icon">📌</span><span>${roadAddr}</span></div>
            <div class="card-row"><span class="icon">📞</span><span>${phone}</span></div>
            <div class="card-row"><span class="icon">🏷️</span><span>${category.split(' > ').pop()}</span></div>
          </div>
        `;

        // 카드 클릭 → 지도 이동 + 인포 표시
        card.addEventListener('click', () => {
          map.panTo(position);
          showInfoOverlay(place, position);
          highlightCard(idx);
        });

        resultList.appendChild(card);
      });

      // 검색 결과 전체가 보이도록 지도 범위 조절
      map.setBounds(bounds);
    }

    /* ────────────────────────────────
       8. 카드 활성화(하이라이트) 함수
    ──────────────────────────────── */
    function highlightCard(idx) {
      document.querySelectorAll('.result-card').forEach(c => c.classList.remove('active'));
      const target = document.querySelector(`.result-card[data-idx="${idx}"]`);
      if (target) {
        target.classList.add('active');
        target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    /* ────────────────────────────────
       9. 검색 실행 함수
    ──────────────────────────────── */
    function runSearch() {
      const keyword = searchInput.value.trim();
      if (!keyword) {
        setStatus('❗ 검색어를 입력해주세요.', 'error');
        searchInput.focus();
        return;
      }

      // 기존 결과 초기화
      clearAll();
      setStatus('🔍 검색 중…', 'loading');

      // 카카오 키워드 검색 API 호출 (현재 지도 중심 기준)
      ps.keywordSearch(keyword, handleSearchResult, {
        location: map.getCenter(),   // 현재 지도 중심
        sort: kakao.maps.services.SortBy.DISTANCE  // 거리순 정렬
      });
    }

    /* ────────────────────────────────
       10. 이벤트 바인딩
    ──────────────────────────────── */
    // 검색 버튼 클릭
    searchBtn.addEventListener('click', runSearch);

    // 엔터 키 입력
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') runSearch();
    });

    // 지도 클릭 시 인포 오버레이 닫기
    kakao.maps.event.addListener(map, 'click', () => {
      if (openOverlay) {
        openOverlay.setMap(null);
        openOverlay = null;
      }
      document.querySelectorAll('.result-card').forEach(c => c.classList.remove('active'));
    });
  </script>
</body>
</html>
