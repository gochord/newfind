<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장소 탐색기</title>

  <script type="text/javascript"
    src="//dapi.kakao.com/v2/maps/sdk.js?appkey=6ac811cfe03fac96b5d6699028337d78&libraries=services">
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ━━━━ CSS 변수 ━━━━ */
    :root {
      --bg:           #f2f2f7;
      --surface:      #ffffff;
      --border:       #e5e5ea;
      --border-soft:  #f0f0f5;
      --accent:       #007aff;
      --accent-light: #e8f0fe;
      --accent-dim:   rgba(0,122,255,.12);
      --red:          #ff3b30;
      --green:        #34c759;
      --text-1:       #1c1c1e;
      --text-2:       #636366;
      --text-3:       #aeaeb2;
      --sh-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --sh-md: 0 4px 16px rgba(0,0,0,.10), 0 1px 4px rgba(0,0,0,.06);
      --sh-lg: 0 16px 40px rgba(0,0,0,.18), 0 4px 12px rgba(0,0,0,.08);
      --r-sm: 8px;  --r-md: 14px;  --r-lg: 20px;
      --sidebar-w: 360px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
    }

    /* ━━━━ 헤더 ━━━━ */
    header {
      flex-shrink: 0;
      height: 54px;
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 18px; gap: 10px; z-index: 200;
    }
    .h-icon {
      width: 32px; height: 32px;
      background: var(--accent); border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      box-shadow: 0 2px 8px rgba(0,122,255,.38);
    }
    .h-title { font-size: .92rem; font-weight: 700; letter-spacing: -.02em; }
    .h-sub   { font-size: .68rem; color: var(--text-3); }

    /* ━━━━ 2분할 ━━━━ */
    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      overflow: hidden;
    }

    /* ━━━━ 사이드바 ━━━━ */
    .sidebar {
      background: var(--bg);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* 검색 패널 */
    .search-panel {
      background: var(--surface);
      padding: 13px 13px 11px;
      border-bottom: 1px solid var(--border-soft);
      flex-shrink: 0;
    }
    .search-row { display: flex; gap: 7px; align-items: center; }
    .s-wrap { flex: 1; position: relative; }
    .s-wrap .s-ico {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%);
      font-size: .8rem; color: var(--text-3); pointer-events: none;
    }
    .s-wrap input {
      width: 100%; padding: 9px 11px 9px 30px;
      background: var(--bg); border: 1.5px solid transparent;
      border-radius: var(--r-sm); font-size: .85rem;
      font-family: inherit; color: var(--text-1); outline: none;
      transition: border-color .18s, background .18s;
    }
    .s-wrap input::placeholder { color: var(--text-3); }
    .s-wrap input:focus { background: var(--surface); border-color: var(--accent); }
    .s-btn {
      padding: 9px 14px; background: var(--accent);
      border: none; border-radius: var(--r-sm);
      color: #fff; font-size: .8rem; font-weight: 600;
      font-family: inherit; cursor: pointer; white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,122,255,.3);
      transition: background .15s, transform .1s;
    }
    .s-btn:hover { background: #0066d6; }
    .s-btn:active { transform: scale(.96); }

    /* 지역 칩 */
    .region-wrap { margin-top: 10px; }
    .region-label {
      font-size: .64rem; font-weight: 700; color: var(--text-3);
      letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px;
    }
    .chips { display: flex; gap: 5px; flex-wrap: wrap; }
    .chip {
      padding: 4px 10px; border-radius: 100px;
      border: 1.5px solid var(--border); background: var(--surface);
      font-size: .72rem; font-weight: 500; color: var(--text-2);
      font-family: inherit; cursor: pointer;
      transition: all .14s; white-space: nowrap;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .chip.active {
      background: var(--accent); border-color: var(--accent);
      color: #fff; box-shadow: 0 2px 8px rgba(0,122,255,.28);
    }

    /* 상태 바 */
    .status-bar {
      padding: 6px 14px; font-size: .72rem; font-weight: 500;
      color: var(--text-3); background: var(--surface);
      border-bottom: 1px solid var(--border-soft);
      min-height: 30px; display: flex; align-items: center; gap: 5px;
      flex-shrink: 0;
    }
    .status-bar.loading { color: var(--accent); }
    .status-bar.error   { color: var(--red); }
    .status-bar.success { color: var(--green); }

    /* 스크롤 영역 전체 */
    .scroll-area {
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .scroll-area::-webkit-scrollbar { width: 4px; }
    .scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       큐레이션 섹션
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    #curationSection {
      padding: 12px 12px 4px;
    }
    .curate-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .curate-title {
      font-size: .8rem; font-weight: 700; color: var(--text-1);
      letter-spacing: -.01em;
    }
    .curate-sub { font-size: .68rem; color: var(--text-3); margin-top: 1px; }

    /* 슬라이더 컨테이너 */
    .slider-outer {
      position: relative; overflow: hidden;
      border-radius: var(--r-md);
      box-shadow: var(--sh-md);
      user-select: none; cursor: grab;
    }
    .slider-outer:active { cursor: grabbing; }
    .slider-track {
      display: flex;
      transition: transform .45s cubic-bezier(.4,0,.2,1);
      will-change: transform;
    }

    /* 큐레이션 카드 */
    .curate-card {
      min-width: 100%; /* 한 장씩 꽉 채우기 */
      height: 168px;
      position: relative;
      overflow: hidden;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 0;
    }
    .card-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      transition: transform .5s ease;
    }
    .curate-card:hover .card-bg { transform: scale(1.03); }
    /* 그라디언트 오버레이 */
    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 20%,
        rgba(0,0,0,.12) 50%,
        rgba(0,0,0,.62) 100%
      );
    }
    .card-content {
      position: relative; z-index: 2;
      padding: 12px 14px 13px;
    }
    .card-tag {
      display: inline-block;
      padding: 3px 8px; border-radius: 100px;
      font-size: .64rem; font-weight: 700;
      margin-bottom: 5px;
      backdrop-filter: blur(6px);
    }
    .card-place-name {
      font-size: 1.05rem; font-weight: 700;
      color: #fff; line-height: 1.3;
      text-shadow: 0 1px 4px rgba(0,0,0,.3);
    }
    .card-region-badge {
      display: inline-flex; align-items: center; gap: 3px;
      margin-top: 4px; font-size: .7rem;
      color: rgba(255,255,255,.82); font-weight: 500;
    }
    .card-desc-preview {
      font-size: .72rem; color: rgba(255,255,255,.75);
      margin-top: 3px; line-height: 1.45;
      /* 한 줄만 표시 */
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* 하단 컨트롤 (화살표 + 도트 + 진행바) */
    .slider-ctrl {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-top: 10px; padding: 0 2px;
    }
    .ctrl-arrows { display: flex; gap: 6px; }
    .arrow-btn {
      width: 28px; height: 28px;
      border-radius: 50%; border: 1.5px solid var(--border);
      background: var(--surface); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem; color: var(--text-2);
      transition: all .14s; box-shadow: var(--sh-sm);
    }
    .arrow-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .arrow-btn:active { transform: scale(.93); }

    .dots { display: flex; gap: 5px; align-items: center; }
    .dot {
      width: 6px; height: 6px; border-radius: 3px;
      background: var(--border); cursor: pointer;
      transition: all .28s cubic-bezier(.4,0,.2,1);
    }
    .dot.active { width: 20px; background: var(--accent); }

    /* 자동 진행 바 */
    .progress-wrap {
      flex: 1; height: 2px; background: var(--border);
      border-radius: 1px; margin: 0 10px; overflow: hidden;
    }
    .progress-bar {
      height: 100%; background: var(--accent);
      border-radius: 1px; width: 0%;
      transition: width linear;
    }

    /* ━━━━ 결과 리스트 ━━━━ */
    #resultSection { padding: 8px 10px 14px; display: none; }
    .empty-hint {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; padding: 36px 20px;
    }
    .empty-hint .e-ico { font-size: 2.2rem; opacity: .45; }
    .empty-hint p { font-size: .78rem; color: var(--text-3); text-align: center; line-height: 1.75; }

    .result-card {
      padding: 11px 13px; margin-bottom: 6px;
      background: var(--surface);
      border: 1.5px solid transparent;
      border-radius: var(--r-md);
      cursor: pointer; box-shadow: var(--sh-sm);
      position: relative;
      transition: border-color .15s, box-shadow .15s, transform .12s;
      animation: cardIn .2s ease both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .result-card:hover { border-color: var(--accent); box-shadow: var(--sh-md); transform: translateY(-1px); }
    .result-card.active { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 3px var(--accent-dim); }
    .card-num { position: absolute; top: 9px; right: 11px; font-size: .64rem; font-weight: 700; color: var(--text-3); }
    .card-name { font-size: .86rem; font-weight: 700; margin-bottom: 6px; padding-right: 26px; line-height: 1.4; }
    .card-rows { display: flex; flex-direction: column; gap: 3px; }
    .card-row { display: flex; align-items: flex-start; gap: 6px; font-size: .72rem; color: var(--text-2); line-height: 1.55; }
    .card-row .ri { flex-shrink: 0; font-size: .76rem; line-height: 1.55; }

    /* ━━━━ 지도 ━━━━ */
    #map { width: 100%; height: 100%; }

    /* ━━━━ 이모지 마커 ━━━━ */
    .emoji-marker {
      font-size: 1.85rem; line-height: 1; cursor: pointer;
      filter: drop-shadow(0 3px 5px rgba(0,0,0,.18));
      transition: transform .15s, filter .15s;
      user-select: none; display: block;
    }
    .emoji-marker:hover { transform: scale(1.3) translateY(-3px); filter: drop-shadow(0 6px 10px rgba(0,0,0,.22)); }

    /* ━━━━ 인포 팝업 ━━━━ */
    .info-bubble {
      background: var(--surface); border-radius: var(--r-md);
      padding: 13px 14px 12px; min-width: 190px; max-width: 245px;
      box-shadow: var(--sh-lg); border: 1px solid var(--border);
      position: relative;
      animation: popIn .17s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.88) translateY(5px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .info-x {
      position: absolute; top: 8px; right: 9px;
      width: 19px; height: 19px; background: var(--bg);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: .68rem; color: var(--text-2); cursor: pointer; transition: background .12s;
    }
    .info-x:hover { background: var(--border); }
    .info-name { font-size: .86rem; font-weight: 700; margin-bottom: 4px; padding-right: 22px; line-height: 1.4; }
    .info-addr { font-size: .73rem; color: var(--text-2); line-height: 1.55; }
    .info-phone { font-size: .71rem; color: var(--accent); margin-top: 4px; font-weight: 500; }
    .info-tail {
      width: 0; height: 0;
      border-left: 7px solid transparent; border-right: 7px solid transparent;
      border-top: 8px solid var(--surface);
      margin: 0 auto;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,.07));
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       큐레이션 모달 팝업
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.38);
      backdrop-filter: blur(4px);
      z-index: 500;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .22s;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border-radius: var(--r-lg);
      width: 400px; max-width: 92vw;
      overflow: hidden;
      box-shadow: var(--sh-lg);
      transform: scale(.92) translateY(16px);
      transition: transform .26s cubic-bezier(.34,1.56,.64,1);
    }
    .modal-backdrop.open .modal { transform: scale(1) translateY(0); }

    /* 모달 상단 이미지/그라디언트 영역 */
    .modal-hero {
      height: 160px; position: relative;
      display: flex; align-items: flex-end;
      padding: 16px 20px;
    }
    .modal-hero-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
    }
    .modal-hero-ov {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 30%, rgba(0,0,0,.55) 100%);
    }
    .modal-hero-emoji {
      position: absolute; top: 16px; right: 18px;
      font-size: 2.6rem; filter: drop-shadow(0 3px 8px rgba(0,0,0,.3));
    }
    .modal-hero-content { position: relative; z-index: 2; }
    .modal-tag {
      display: inline-block; padding: 3px 9px; border-radius: 100px;
      font-size: .65rem; font-weight: 700; margin-bottom: 6px;
      backdrop-filter: blur(6px);
    }
    .modal-place { font-size: 1.25rem; font-weight: 800; color: #fff; line-height: 1.25; text-shadow: 0 1px 5px rgba(0,0,0,.3); }
    .modal-region { font-size: .75rem; color: rgba(255,255,255,.8); margin-top: 3px; }

    /* 모달 본문 */
    .modal-body { padding: 18px 20px 20px; }
    .modal-desc { font-size: .84rem; color: var(--text-2); line-height: 1.75; margin-bottom: 16px; }

    /* 모달 정보 테이블 */
    .modal-info { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
    .modal-info-row { display: flex; gap: 10px; align-items: flex-start; }
    .modal-info-ico { font-size: .85rem; flex-shrink: 0; margin-top: 1px; }
    .modal-info-label { font-size: .7rem; color: var(--text-3); font-weight: 600; width: 40px; flex-shrink: 0; margin-top: 2px; }
    .modal-info-val { font-size: .8rem; color: var(--text-1); font-weight: 500; line-height: 1.5; }

    /* 모달 버튼 */
    .modal-btns { display: flex; gap: 8px; }
    .modal-btn {
      flex: 1; padding: 11px;
      border-radius: var(--r-sm);
      font-size: .82rem; font-weight: 600;
      font-family: inherit; cursor: pointer;
      border: none; transition: all .14s;
    }
    .modal-btn.primary {
      background: var(--accent); color: #fff;
      box-shadow: 0 2px 8px rgba(0,122,255,.32);
    }
    .modal-btn.primary:hover { background: #0066d6; }
    .modal-btn.secondary {
      background: var(--bg); color: var(--text-1);
      border: 1.5px solid var(--border);
    }
    .modal-btn.secondary:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .modal-btn:active { transform: scale(.96); }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <header>
    <div class="h-icon">📍</div>
    <div>
      <div class="h-title">장소 탐색기</div>
      <div class="h-sub">Kakao Maps · Keyword Search</div>
    </div>
  </header>

  <div class="layout">

    <!-- 사이드바 -->
    <aside class="sidebar">

      <!-- 검색 패널 -->
      <div class="search-panel">
        <div class="search-row">
          <div class="s-wrap">
            <span class="s-ico">🔍</span>
            <input id="searchInput" type="text" placeholder="카페, 병원, 편의점…" autocomplete="off" />
          </div>
          <button class="s-btn" id="searchBtn">검색</button>
        </div>
        <div class="region-wrap">
          <div class="region-label">지역 선택</div>
          <div class="chips" id="regionChips"></div>
        </div>
      </div>

      <!-- 상태 바 -->
      <div class="status-bar" id="statusBar">아래 큐레이션을 눌러보거나 검색해보세요.</div>

      <!-- 스크롤 전체 영역 -->
      <div class="scroll-area">

        <!-- ── 큐레이션 캐러셀 ── -->
        <div id="curationSection">
          <div class="curate-header">
            <div>
              <div class="curate-title">✨ 이런 장소는 어때요?</div>
              <div class="curate-sub">눌러서 자세히 보기</div>
            </div>
          </div>

          <!-- 슬라이더 -->
          <div class="slider-outer" id="sliderOuter">
            <div class="slider-track" id="sliderTrack">
              <!-- JS로 카드 삽입 -->
            </div>
          </div>

          <!-- 컨트롤: 화살표 · 진행바 · 도트 -->
          <div class="slider-ctrl">
            <div class="ctrl-arrows">
              <button class="arrow-btn" id="btnPrev">◀</button>
              <button class="arrow-btn" id="btnNext">▶</button>
            </div>
            <div class="progress-wrap">
              <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="dots" id="dotWrap"></div>
          </div>
        </div>

        <!-- ── 검색 결과 리스트 ── -->
        <div id="resultSection"></div>

      </div><!-- /scroll-area -->
    </aside>

    <div id="map"></div>
  </div>

  <!-- ── 큐레이션 모달 ── -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="modal">
      <div class="modal-hero" id="modalHero">
        <div class="modal-hero-bg" id="modalHeroBg"></div>
        <div class="modal-hero-ov"></div>
        <div class="modal-hero-emoji" id="modalEmoji"></div>
        <div class="modal-hero-content">
          <div class="modal-tag" id="modalTag"></div>
          <div class="modal-place" id="modalPlace"></div>
          <div class="modal-region" id="modalRegion"></div>
        </div>
      </div>
      <div class="modal-body">
        <p class="modal-desc" id="modalDesc"></p>
        <div class="modal-info" id="modalInfo"></div>
        <div class="modal-btns">
          <button class="modal-btn primary" id="modalSearchBtn">🗺️ 지도에서 바로 찾기</button>
          <button class="modal-btn secondary" id="modalCloseBtn">닫기</button>
        </div>
      </div>
    </div>
  </div>

  <script>

      const btn = document.createElement('button');
      btn.className = 'chip' + (i === 0 ? ' active' : '');
      btn.textContent = r.name;
      btn.addEventListener('click', () => {
        chipWrap.querySelector('.chip.active')?.classList.remove('active');
        btn.classList.add('active');
        map.setCenter(new kakao.maps.LatLng(r.lat, r.lng));
        map.setLevel(r.level);
      });
      chipWrap.appendChild(btn);

    function getEmoji(cat) {
      if (!cat) return '📍';
      if (cat.includes('카페'))                              return '☕';
      if (cat.includes('음식점') || cat.includes('식당'))    return '🍽️';
      if (cat.includes('편의점'))                            return '🏪';
      if (cat.includes('병원') || cat.includes('의원'))      return '🏥';
      if (cat.includes('약국'))                              return '💊';
      if (cat.includes('학교') || cat.includes('교육'))      return '🏫';
      if (cat.includes('주차'))                              return '🅿️';
      if (cat.includes('마트'))                              return '🛒';
      if (cat.includes('은행'))                              return '🏦';
      if (cat.includes('주유소'))                            return '⛽';
      if (cat.includes('숙박') || cat.includes('호텔'))      return '🏨';
      if (cat.includes('영화') || cat.includes('문화'))      return '🎬';
      if (cat.includes('스포츠') || cat.includes('헬스'))    return '💪';
      if (cat.includes('베이커리') || cat.includes('빵'))    return '🥐';
      if (cat.includes('술') || cat.includes('바'))         return '🍺';
      return '📍';
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    function clearAll() {
      markerOverlays.forEach(ov => ov.setMap(null));
      markerOverlays = [];
      closeInfo();
      document.getElementById('resultSection').innerHTML = '';
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    function closeInfo() {
      if (openInfoOverlay) { openInfoOverlay.setMap(null); openInfoOverlay = null; }
    }

    function showInfo(place, pos) {
      closeInfo();
      const wrap   = document.createElement('div');
      const bubble = document.createElement('div');
      bubble.className = 'info-bubble';

      const xBtn = document.createElement('div');
      xBtn.className = 'info-x'; xBtn.textContent = '✕';
      xBtn.addEventListener('click', e => { e.stopPropagation(); closeInfo(); });

      const nm = document.createElement('div');
      nm.className = 'info-name'; nm.textContent = place.place_name;
      const ad = document.createElement('div');
      ad.className = 'info-addr';
      ad.textContent = place.road_address_name || place.address_name || '주소 정보 없음';

      bubble.appendChild(xBtn); bubble.appendChild(nm); bubble.appendChild(ad);
      if (place.phone) {
        const ph = document.createElement('div');
        ph.className = 'info-phone'; ph.textContent = '📞 ' + place.phone;
        bubble.appendChild(ph);
      }

      const tail = document.createElement('div'); tail.className = 'info-tail';
      wrap.appendChild(bubble); wrap.appendChild(tail);

      openInfoOverlay = new kakao.maps.CustomOverlay({
        position: pos, content: wrap, yAnchor: 1.48, zIndex: 20
      });
      openInfoOverlay.setMap(map);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       8. 카드 하이라이트
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    function highlightCard(idx) {
      document.querySelectorAll('.result-card').forEach(c => c.classList.remove('active'));
      const t = document.querySelector(`.result-card[data-idx="${idx}"]`);
      if (t) { t.classList.add('active'); t.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    function setStatus(msg, type = '') {
      const b = document.getElementById('statusBar');
      b.textContent = msg; b.className = 'status-bar ' + type;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       10. 검색 결과 콜백
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    function handleResult(data, status) {
      const sec = document.getElementById('resultSection');

      if (status !== kakao.maps.services.Status.OK) {
        setStatus('결과를 찾지 못했어요.', 'error');
        sec.innerHTML = `
          <div class="empty-hint">
            <div class="e-ico">😕</div>
            <p>검색 결과가 없어요.<br/>다른 키워드를 입력해보세요.</p>
          </div>`;
        return;
      }

      setStatus(`${data.length}곳을 찾았어요 ✓`, 'success');
      const bounds = new kakao.maps.LatLngBounds();

      data.forEach((place, idx) => {
        const pos   = new kakao.maps.LatLng(place.y, place.x);
        const emoji = getEmoji(place.category_name);
        bounds.extend(pos);

        /* 이모지 마커 — DOM 요소 직접 생성 (이벤트 바로 등록) */
        const mEl = document.createElement('div');
        mEl.className = 'emoji-marker'; mEl.textContent = emoji;
        mEl.addEventListener('click', e => {
          e.stopPropagation();
          map.panTo(pos); showInfo(place, pos); highlightCard(idx);
        });
        const mOv = new kakao.maps.CustomOverlay({ position: pos, content: mEl, yAnchor: 1.1, zIndex: 5 });
        mOv.setMap(map); markerOverlays.push(mOv);

        /* 결과 카드 */
        const card = document.createElement('div');
        card.className = 'result-card'; card.dataset.idx = idx;
        card.style.animationDelay = `${idx * 0.04}s`;

        const addr = place.road_address_name || place.address_name || '주소 없음';
        const cat  = place.category_name ? place.category_name.split(' > ').pop() : '분류 없음';

        card.innerHTML = `
          <span class="card-num">#${idx + 1}</span>
          <div class="card-name">${emoji} ${place.place_name}</div>
          <div class="card-rows">
            <div class="card-row"><span class="ri">📌</span><span>${addr}</span></div>
            <div class="card-row"><span class="ri">📞</span><span>${place.phone || '전화번호 없음'}</span></div>
            <div class="card-row"><span class="ri">🏷️</span><span>${cat}</span></div>
          </div>`;

        card.addEventListener('click', () => { map.panTo(pos); showInfo(place, pos); highlightCard(idx); });
        sec.appendChild(card);
      });

      map.setBounds(bounds);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       11. 검색 실행
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    function runSearch(keyword) {
      const kw = keyword || document.getElementById('searchInput').value.trim();
      if (!kw) { setStatus('검색어를 입력해주세요.', 'error'); document.getElementById('searchInput').focus(); return; }

      clearAll();
      setStatus('검색 중…', 'loading');

      // 큐레이션 숨기고 결과 섹션 표시
      document.getElementById('curationSection').style.display = 'none';
      const sec = document.getElementById('resultSection');
      sec.style.display = 'block'; sec.innerHTML = '';

      ps.keywordSearch(kw, handleResult, {
        location: map.getCenter(),
        sort: kakao.maps.services.SortBy.DISTANCE
      });
    }

    document.getElementById('searchBtn').addEventListener('click', () => runSearch());
    document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });
    kakao.maps.event.addListener(map, 'click', () => {
      closeInfo();
      document.querySelectorAll('.result-card').forEach(c => c.classList.remove('active'));
    });

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       12. 큐레이션 캐러셀
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    const track     = document.getElementById('sliderTrack');
    const dotWrap   = document.getElementById('dotWrap');
    const progressEl= document.getElementById('progressBar');
    let curIdx      = 0;
    let autoTimer   = null;
    let progTimer   = null;
    const AUTO_SEC  = 10; // 자동 슬라이드 간격 (초)

    /* 카드 및 도트 빌드 */
    CURATION.forEach((c, i) => {
      /* 슬라이더 카드 */
      const card = document.createElement('div');
      card.className = 'curate-card';

      const bg = document.createElement('div');
      bg.className = 'card-bg';
      bg.style.background = c.gradient;

      const ov = document.createElement('div'); ov.className = 'card-overlay';

      const cnt = document.createElement('div'); cnt.className = 'card-content';
      cnt.innerHTML = `
        <span class="card-tag" style="background:${c.tagBg};color:${c.tagColor}">${c.tag}</span>
        <div class="card-place-name">${c.name}</div>
        <div class="card-region-badge">📍 ${c.region}</div>
        <div class="card-desc-preview">${c.desc}</div>
      `;

      card.appendChild(bg); card.appendChild(ov); card.appendChild(cnt);

      // 카드 클릭 → 모달 열기
      card.addEventListener('click', () => openModal(i));
      // 터치 스와이프용 drag prevention
      card.addEventListener('mousedown', e => e.preventDefault());

      track.appendChild(card);

      /* 도트 */
      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => goTo(i));
      dotWrap.appendChild(dot);
    });

    /* 특정 슬라이드로 이동 */
    function goTo(n) {
      curIdx = (n + CURATION.length) % CURATION.length;
      track.style.transform = `translateX(-${curIdx * 100}%)`;

      // 도트 업데이트
      dotWrap.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === curIdx);
      });

      // 진행바 리셋 후 재시작
      restartProgress();
    }

    /* 자동 슬라이드 진행바 */
    function restartProgress() {
      clearInterval(progTimer);
      progressEl.style.transition = 'none';
      progressEl.style.width = '0%';

      // 다음 프레임에서 트랜지션 적용 (리플로우 강제)
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          progressEl.style.transition = `width ${AUTO_SEC}s linear`;
          progressEl.style.width = '100%';
        });
      });
    }

    /* 자동 슬라이드 타이머 */
    function startAuto() {
      clearInterval(autoTimer);
      autoTimer = setInterval(() => goTo(curIdx + 1), AUTO_SEC * 1000);
      restartProgress();
    }

    /* 화살표 버튼 */
    document.getElementById('btnPrev').addEventListener('click', () => { goTo(curIdx - 1); startAuto(); });
    document.getElementById('btnNext').addEventListener('click', () => { goTo(curIdx + 1); startAuto(); });

    /* 마우스 드래그로 스와이프 */
    let dragStartX = 0, isDragging = false;
    const sliderOuter = document.getElementById('sliderOuter');

    sliderOuter.addEventListener('mousedown', e => { isDragging = true; dragStartX = e.clientX; });
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      // 드래그 중 트랙 이동 피드백 (선택사항)
    });
    window.addEventListener('mouseup', e => {
      if (!isDragging) return;
      isDragging = false;
      const diff = dragStartX - e.clientX;
      if (Math.abs(diff) > 40) { goTo(diff > 0 ? curIdx + 1 : curIdx - 1); startAuto(); }
    });

    /* 터치 스와이프 */
    let touchStartX = 0;
    sliderOuter.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    sliderOuter.addEventListener('touchend', e => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) { goTo(diff > 0 ? curIdx + 1 : curIdx - 1); startAuto(); }
    });

    // 첫 자동 슬라이드 시작
    startAuto();

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       13. 큐레이션 모달
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    const backdrop     = document.getElementById('modalBackdrop');
    const modalSearchB = document.getElementById('modalSearchBtn');
    const modalCloseB  = document.getElementById('modalCloseBtn');
    let   activePlace  = null;

    function openModal(idx) {
      const c = CURATION[idx];
      activePlace = c;

      // 배경
      document.getElementById('modalHeroBg').style.background = c.gradient;
      document.getElementById('modalEmoji').textContent        = c.emoji;

      // 태그
      const tagEl = document.getElementById('modalTag');
      tagEl.textContent         = c.tag;
      tagEl.style.background    = c.tagBg;
      tagEl.style.color         = c.tagColor;

      document.getElementById('modalPlace').textContent  = c.name;
      document.getElementById('modalRegion').textContent = '📍 ' + c.region;
      document.getElementById('modalDesc').textContent   = c.desc;

      // 정보 리스트
      const infoEl = document.getElementById('modalInfo');
      infoEl.innerHTML = '';
      c.tips.forEach(t => {
        const row = document.createElement('div');
        row.className = 'modal-info-row';
        row.innerHTML = `
          <span class="modal-info-ico">${t.ico}</span>
          <span class="modal-info-label">${t.label}</span>
          <span class="modal-info-val">${t.val}</span>`;
        infoEl.appendChild(row);
      });

      backdrop.classList.add('open');
      // 자동 슬라이드 일시 정지
      clearInterval(autoTimer);
      clearInterval(progTimer);
      progressEl.style.transition = 'none';
    }

    function closeModal() {
      backdrop.classList.remove('open');
      activePlace = null;
      startAuto(); // 모달 닫으면 자동 슬라이드 재개
    }

    // "지도에서 바로 찾기" → 검색 실행
    modalSearchB.addEventListener('click', () => {
      if (!activePlace) return;
      closeModal();
      // 해당 지역으로 이동
      goToRegion(activePlace.regionIdx);
      // 입력창에 키워드 채우고 검색
      document.getElementById('searchInput').value = activePlace.keyword;
      setTimeout(() => runSearch(activePlace.keyword), 350); // 지도 이동 후 검색
    });

    modalCloseB.addEventListener('click', closeModal);
    backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });

    // ESC 키로 모달 닫기
    window.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>
</body>
</html>
