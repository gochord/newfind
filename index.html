<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장소 탐색기</title>

  <!-- 카카오맵 SDK -->
  <script type="text/javascript"
    src="//dapi.kakao.com/v2/maps/sdk.js?appkey=6ac811cfe03fac96b5d6699028337d78&libraries=services">
  </script>

  <!-- 한국어 최적화 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       CSS 변수 — Apple HIG 기반 라이트 테마
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    :root {
      --bg:           #f2f2f7;
      --surface:      #ffffff;
      --surface2:     #f9f9fb;
      --border:       #e5e5ea;
      --border-soft:  #f0f0f5;

      --accent:       #007aff;
      --accent-light: #e8f0fe;
      --accent-dim:   rgba(0,122,255,.12);

      --red:    #ff3b30;
      --green:  #34c759;

      --text-primary:   #1c1c1e;
      --text-secondary: #636366;
      --text-tertiary:  #aeaeb2;

      --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,.10), 0 1px 4px rgba(0,0,0,.06);
      --shadow-lg: 0 12px 32px rgba(0,0,0,.14), 0 2px 8px rgba(0,0,0,.06);

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 18px;

      --sidebar-w: 360px;
      --header-h:  56px;
    }

    /* ── 리셋 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ━━━━━━━━━━━━━━━━━━━━ 헤더 ━━━━━━━━━━━━━━━━━━━━ */
    header {
      flex-shrink: 0;
      height: var(--header-h);
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 11px;
      z-index: 100;
    }
    .header-icon {
      width: 33px; height: 33px;
      background: var(--accent);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.05rem;
      box-shadow: 0 2px 8px rgba(0,122,255,.38);
      flex-shrink: 0;
    }
    .header-title {
      font-size: .95rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -.02em;
    }
    .header-sub {
      font-size: .7rem;
      color: var(--text-tertiary);
      font-weight: 400;
    }

    /* ━━━━━━━━━━━━━━━━━━━━ 레이아웃 ━━━━━━━━━━━━━━━━━━━━ */
    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      overflow: hidden;
    }

    /* ━━━━━━━━━━━━━━━━━━━━ 사이드바 ━━━━━━━━━━━━━━━━━━━━ */
    .sidebar {
      background: var(--bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 검색 패널 */
    .search-panel {
      background: var(--surface);
      padding: 14px 14px 12px;
      border-bottom: 1px solid var(--border-soft);
    }

    .search-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .search-field {
      flex: 1;
      position: relative;
    }
    .search-field .s-icon {
      position: absolute;
      left: 11px; top: 50%;
      transform: translateY(-50%);
      font-size: .82rem;
      color: var(--text-tertiary);
      pointer-events: none;
    }
    .search-field input {
      width: 100%;
      padding: 9px 12px 9px 32px;
      background: var(--bg);
      border: 1.5px solid transparent;
      border-radius: var(--radius-md);
      font-size: .875rem;
      font-family: inherit;
      color: var(--text-primary);
      outline: none;
      transition: border-color .18s, background .18s;
    }
    .search-field input::placeholder { color: var(--text-tertiary); }
    .search-field input:focus {
      background: var(--surface);
      border-color: var(--accent);
    }
    .search-btn {
      padding: 9px 16px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-md);
      color: #fff;
      font-size: .82rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,122,255,.32);
      transition: background .15s, transform .1s;
    }
    .search-btn:hover { background: #0066d6; }
    .search-btn:active { transform: scale(.96); }

    /* 지역 칩 */
    .region-section { margin-top: 11px; }
    .region-label {
      font-size: .67rem;
      font-weight: 600;
      color: var(--text-tertiary);
      letter-spacing: .07em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    .region-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .chip {
      padding: 5px 11px;
      border-radius: 100px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: .74rem;
      font-weight: 500;
      color: var(--text-secondary);
      font-family: inherit;
      cursor: pointer;
      transition: all .14s;
      white-space: nowrap;
    }
    .chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }
    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,122,255,.28);
    }

    /* 상태 바 */
    .status-bar {
      padding: 7px 16px;
      font-size: .74rem;
      font-weight: 500;
      color: var(--text-tertiary);
      background: var(--surface);
      border-bottom: 1px solid var(--border-soft);
      min-height: 32px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .status-bar.loading { color: var(--accent); }
    .status-bar.error   { color: var(--red); }
    .status-bar.success { color: var(--green); }

    /* 결과 리스트 */
    .result-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 10px 16px;
    }
    .result-list::-webkit-scrollbar { width: 4px; }
    .result-list::-webkit-scrollbar-track { background: transparent; }
    .result-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .empty-hint {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 40px 20px;
    }
    .empty-hint .e-icon { font-size: 2.4rem; opacity: .5; }
    .empty-hint p {
      font-size: .81rem;
      color: var(--text-tertiary);
      text-align: center;
      line-height: 1.75;
    }

    /* 결과 카드 */
    .result-card {
      padding: 12px 14px;
      margin-bottom: 7px;
      background: var(--surface);
      border: 1.5px solid transparent;
      border-radius: var(--radius-md);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      position: relative;
      transition: border-color .15s, box-shadow .15s, transform .12s;
      animation: cardIn .2s ease both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .result-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }
    .result-card.active {
      border-color: var(--accent);
      background: var(--accent-light);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .card-num {
      position: absolute;
      top: 10px; right: 12px;
      font-size: .66rem;
      font-weight: 700;
      color: var(--text-tertiary);
    }
    .card-name {
      font-size: .88rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 7px;
      padding-right: 28px;
      line-height: 1.4;
    }
    .card-rows { display: flex; flex-direction: column; gap: 4px; }
    .card-row {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      font-size: .73rem;
      color: var(--text-secondary);
      line-height: 1.55;
    }
    .card-row .ri { flex-shrink: 0; font-size: .78rem; line-height: 1.55; }

    /* ━━━━━━━━━━━━━━━━━━━━ 지도 ━━━━━━━━━━━━━━━━━━━━ */
    #map { width: 100%; height: 100%; }

    /* ━━━━━━━━━━━━━━━━━━━━ 이모지 마커 ━━━━━━━━━━━━━━━━━━━━ */
    .emoji-marker {
      font-size: 1.85rem;
      line-height: 1;
      cursor: pointer;
      filter: drop-shadow(0 3px 5px rgba(0,0,0,.18));
      transition: transform .15s, filter .15s;
      user-select: none;
      display: block;
    }
    .emoji-marker:hover {
      transform: scale(1.3) translateY(-3px);
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.22));
    }

    /* ━━━━━━━━━━━━━━━━━━━━ 인포 팝업 ━━━━━━━━━━━━━━━━━━━━ */
    .info-bubble {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 13px 14px 12px;
      min-width: 195px;
      max-width: 250px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      position: relative;
      animation: popIn .17s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.88) translateY(5px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .info-close-btn {
      position: absolute;
      top: 8px; right: 9px;
      width: 20px; height: 20px;
      background: var(--bg);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background .12s;
    }
    .info-close-btn:hover { background: var(--border); }
    .info-place-name {
      font-size: .88rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 5px;
      padding-right: 22px;
      line-height: 1.4;
    }
    .info-place-addr {
      font-size: .74rem;
      color: var(--text-secondary);
      line-height: 1.55;
    }
    .info-place-phone {
      font-size: .72rem;
      color: var(--accent);
      margin-top: 5px;
      font-weight: 500;
    }
    /* 말풍선 꼬리 */
    .info-tail {
      width: 0; height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 8px solid var(--surface);
      margin: 0 auto;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,.06));
    }
  </style>
</head>
<body>

  <header>
    <div class="header-icon">📍</div>
    <div>
      <div class="header-title">장소 탐색기</div>
      <div class="header-sub">Kakao Maps · Keyword Search</div>
    </div>
  </header>

  <div class="layout">

    <aside class="sidebar">

      <div class="search-panel">
        <!-- 검색 입력 -->
        <div class="search-row">
          <div class="search-field">
            <span class="s-icon">🔍</span>
            <input id="searchInput" type="text"
              placeholder="카페, 병원, 편의점…"
              autocomplete="off" />
          </div>
          <button class="search-btn" id="searchBtn">검색</button>
        </div>

        <!-- 지역 선택 칩 -->
        <div class="region-section">
          <div class="region-label">지역 선택</div>
          <div class="region-chips" id="regionChips"></div>
        </div>
      </div>

      <!-- 상태 메시지 -->
      <div class="status-bar" id="statusBar">검색어를 입력해보세요.</div>

      <!-- 결과 리스트 -->
      <div class="result-list" id="resultList">
        <div class="empty-hint">
          <div class="e-icon">🗺️</div>
          <p>위 검색창에 키워드를 입력하거나<br/>지역 버튼으로 중심지를 바꿔보세요.</p>
        </div>
      </div>

    </aside>

    <div id="map"></div>

  </div>

  <script>
    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       1. 지역 프리셋 데이터
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    const REGIONS = [
      { name: '🏫 학교',   lat: 37.6600, lng: 126.8300, level: 5 },
      { name: '🏙️ 성수',   lat: 37.5447, lng: 127.0557, level: 4 },
      { name: '🎸 홍대',   lat: 37.5571, lng: 126.9240, level: 4 },
      { name: '🌿 연남',   lat: 37.5618, lng: 126.9236, level: 4 },
      { name: '🏢 강남',   lat: 37.4980, lng: 127.0276, level: 4 },
      { name: '🎡 잠실',   lat: 37.5133, lng: 127.1000, level: 4 },
      { name: '🌏 이태원',  lat: 37.5346, lng: 126.9943, level: 4 },
      { name: '🏯 수원',   lat: 37.2636, lng: 127.0286, level: 4 },
      { name: '🌊 부산',   lat: 35.1796, lng: 129.0756, level: 5 },
    ];

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       2. 지도 초기화
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    const map = new kakao.maps.Map(document.getElementById('map'), {
      center: new kakao.maps.LatLng(37.66, 126.83),
      level: 5
    });
    const ps = new kakao.maps.services.Places(); // 장소 검색 서비스

    let markerOverlays  = [];    // 지도 위 이모지 마커 목록
    let openInfoOverlay = null;  // 현재 열린 인포 팝업

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       3. 지역 칩 렌더링
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    const chipContainer = document.getElementById('regionChips');

    REGIONS.forEach((region, idx) => {
      const btn = document.createElement('button');
      btn.className = 'chip' + (idx === 0 ? ' active' : '');
      btn.textContent = region.name;

      btn.addEventListener('click', () => {
        // 활성 칩 교체
        chipContainer.querySelector('.chip.active')?.classList.remove('active');
        btn.classList.add('active');

        // 지도 중심 & 레벨 변경
        map.setCenter(new kakao.maps.LatLng(region.lat, region.lng));
        map.setLevel(region.level);
      });

      chipContainer.appendChild(btn);
    });

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       4. 카테고리별 이모지 반환
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    function getEmoji(category) {
      if (!category) return '📍';
      if (category.includes('카페'))                               return '☕';
      if (category.includes('음식점') || category.includes('식당')) return '🍽️';
      if (category.includes('편의점'))                             return '🏪';
      if (category.includes('병원') || category.includes('의원'))  return '🏥';
      if (category.includes('약국'))                               return '💊';
      if (category.includes('학교') || category.includes('교육'))  return '🏫';
      if (category.includes('주차'))                               return '🅿️';
      if (category.includes('마트'))                               return '🛒';
      if (category.includes('은행'))                               return '🏦';
      if (category.includes('주유소'))                             return '⛽';
      if (category.includes('숙박') || category.includes('호텔'))  return '🏨';
      if (category.includes('영화') || category.includes('문화'))  return '🎬';
      if (category.includes('스포츠') || category.includes('헬스')) return '💪';
      if (category.includes('베이커리') || category.includes('빵')) return '🥐';
      if (category.includes('술') || category.includes('바'))      return '🍺';
      return '📍';
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       5. 기존 결과 전체 초기화
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    function clearAll() {
      // 마커 오버레이 제거
      markerOverlays.forEach(ov => ov.setMap(null));
      markerOverlays = [];

      // 인포 팝업 닫기
      closeInfoOverlay();

      // 결과 리스트 비우기
      document.getElementById('resultList').innerHTML = '';
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       6. 인포 팝업 열기 / 닫기
       ─ DOM 요소로 만들어 이벤트를 직접 등록하므로
         마커 클릭이 확실하게 작동함
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    function closeInfoOverlay() {
      if (openInfoOverlay) {
        openInfoOverlay.setMap(null);
        openInfoOverlay = null;
      }
    }

    function showInfoOverlay(place, position) {
      closeInfoOverlay(); // 이미 열려 있는 팝업 닫기

      /* 팝업 DOM 직접 생성 */
      const wrapper = document.createElement('div');

      const bubble = document.createElement('div');
      bubble.className = 'info-bubble';

      // 닫기 버튼
      const closeBtn = document.createElement('div');
      closeBtn.className = 'info-close-btn';
      closeBtn.textContent = '✕';
      closeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        closeInfoOverlay();
      });

      // 상호명
      const nameEl = document.createElement('div');
      nameEl.className = 'info-place-name';
      nameEl.textContent = place.place_name;

      // 주소
      const addrEl = document.createElement('div');
      addrEl.className = 'info-place-addr';
      addrEl.textContent = place.road_address_name || place.address_name || '주소 정보 없음';

      bubble.appendChild(closeBtn);
      bubble.appendChild(nameEl);
      bubble.appendChild(addrEl);

      // 전화번호 있을 때만 추가
      if (place.phone) {
        const phoneEl = document.createElement('div');
        phoneEl.className = 'info-place-phone';
        phoneEl.textContent = '📞 ' + place.phone;
        bubble.appendChild(phoneEl);
      }

      // 말풍선 꼬리
      const tail = document.createElement('div');
      tail.className = 'info-tail';

      wrapper.appendChild(bubble);
      wrapper.appendChild(tail);

      openInfoOverlay = new kakao.maps.CustomOverlay({
        position: position,
        content: wrapper,
        yAnchor: 1.48,
        zIndex: 20
      });
      openInfoOverlay.setMap(map);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       7. 카드 하이라이트
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    function highlightCard(idx) {
      document.querySelectorAll('.result-card').forEach(c => c.classList.remove('active'));
      const target = document.querySelector(`.result-card[data-idx="${idx}"]`);
      if (target) {
        target.classList.add('active');
        target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       8. 상태 메시지 변경
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    function setStatus(msg, type = '') {
      const bar = document.getElementById('statusBar');
      bar.textContent = msg;
      bar.className   = 'status-bar ' + type;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       9. 검색 결과 처리 콜백
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    function handleSearchResult(data, status) {
      const list = document.getElementById('resultList');

      // 검색 실패 처리
      if (status !== kakao.maps.services.Status.OK) {
        setStatus('결과를 찾지 못했어요. 다른 키워드를 시도해보세요.', 'error');
        list.innerHTML = `
          <div class="empty-hint">
            <div class="e-icon">😕</div>
            <p>검색 결과가 없어요.<br/>다른 키워드를 입력해보세요.</p>
          </div>`;
        return;
      }

      setStatus(`${data.length}곳을 찾았어요 ✓`, 'success');

      const bounds = new kakao.maps.LatLngBounds(); // 지도 범위 자동 조절용

      data.forEach((place, idx) => {
        const position = new kakao.maps.LatLng(place.y, place.x);
        bounds.extend(position);

        const emoji = getEmoji(place.category_name);

        /* ─ 이모지 마커: DOM 요소로 생성해서 이벤트 직접 등록 ─
           string 대신 HTMLElement를 넘기면 setTimeout 없이도
           클릭 이벤트가 확실히 작동함                           */
        const markerEl = document.createElement('div');
        markerEl.className = 'emoji-marker';
        markerEl.textContent = emoji;
        markerEl.addEventListener('click', (e) => {
          e.stopPropagation();
          map.panTo(position);
          showInfoOverlay(place, position);
          highlightCard(idx);
        });

        const markerOv = new kakao.maps.CustomOverlay({
          position: position,
          content: markerEl,
          yAnchor: 1.1,
          zIndex: 5
        });
        markerOv.setMap(map);
        markerOverlays.push(markerOv);

        /* ─ 결과 카드 ─ */
        const card = document.createElement('div');
        card.className = 'result-card';
        card.dataset.idx = idx;
        card.style.animationDelay = `${idx * 0.04}s`;

        const addr     = place.road_address_name || place.address_name || '주소 없음';
        const phone    = place.phone || '전화번호 없음';
        const category = place.category_name
          ? place.category_name.split(' > ').pop()
          : '분류 없음';

        card.innerHTML = `
          <span class="card-num">#${idx + 1}</span>
          <div class="card-name">${emoji} ${place.place_name}</div>
          <div class="card-rows">
            <div class="card-row"><span class="ri">📌</span><span>${addr}</span></div>
            <div class="card-row"><span class="ri">📞</span><span>${phone}</span></div>
            <div class="card-row"><span class="ri">🏷️</span><span>${category}</span></div>
          </div>
        `;

        // 카드 클릭 → 지도 이동 + 팝업
        card.addEventListener('click', () => {
          map.panTo(position);
          showInfoOverlay(place, position);
          highlightCard(idx);
        });

        list.appendChild(card);
      });

      // 모든 결과가 지도에 보이도록 범위 자동 조절
      map.setBounds(bounds);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       10. 검색 실행
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    function runSearch() {
      const keyword = document.getElementById('searchInput').value.trim();
      if (!keyword) {
        setStatus('검색어를 입력해주세요.', 'error');
        document.getElementById('searchInput').focus();
        return;
      }

      clearAll();
      setStatus('검색 중…', 'loading');

      // 현재 지도 중심(선택된 지역)을 기준으로 키워드 검색
      ps.keywordSearch(keyword, handleSearchResult, {
        location: map.getCenter(),
        sort: kakao.maps.services.SortBy.DISTANCE
      });
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       11. 이벤트 바인딩
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    document.getElementById('searchBtn').addEventListener('click', runSearch);
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') runSearch();
    });

    // 지도 빈 곳 클릭 시 팝업 닫기 + 카드 선택 해제
    kakao.maps.event.addListener(map, 'click', () => {
      closeInfoOverlay();
      document.querySelectorAll('.result-card').forEach(c => c.classList.remove('active'));
    });
  </script>
</body>
</html>
